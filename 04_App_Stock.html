<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#143757">
<title>Stock · Galpones</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  :root {
    --primary: #1F4E78;
    --primary-dark: #143757;
    --primary-deep: #0B1F35;
    --accent: #2E8B57;
    --accent-2: #3BA272;
    --warn: #C0392B;
    --warn-2: #FF6B6B;
    --orange: #D97706;
    --purple: #7C3AED;
    --bg: #F4F6F9;
    --card: #FFFFFF;
    --text: #222;
    --muted: #6B7280;
    --border: #E3E7ED;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; font-size:16px; }

  /* ================= LOGIN ================= */
  #login-view {
    position:fixed; inset:0; z-index:300;
    background: radial-gradient(ellipse at top, #2A5F8F 0%, #143757 40%, #0B1F35 100%);
    display:none; flex-direction:column; align-items:center; justify-content:center;
    padding:30px 20px;
    overflow-y:auto;
  }
  #login-view.open { display:flex; }
  .login-logo { font-size:52px; margin-bottom:6px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3)); }
  .login-title { color:#fff; font-size:22px; font-weight:700; margin:0; letter-spacing:0.4px; }
  .login-sub { color:rgba(255,255,255,0.65); font-size:13px; margin:4px 0 26px; }

  /* Selección de usuario */
  .user-pick { display:grid; gap:10px; width:100%; max-width:340px; }
  .user-card {
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:14px; padding:14px 16px;
    display:flex; align-items:center; gap:14px;
    color:#fff; cursor:pointer;
    transition:transform .12s ease, background .15s ease;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .user-card:active { transform:scale(0.98); background:rgba(255,255,255,0.16); }
  .user-card .avatar-sm {
    width:44px; height:44px; border-radius:50%;
    background:linear-gradient(135deg, #3BA272, #1F4E78);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:18px;
    box-shadow:0 4px 10px rgba(0,0,0,0.25);
  }
  .user-card .t strong { display:block; font-size:16px; font-weight:600; }
  .user-card .t small  { color:rgba(255,255,255,0.65); font-size:12px; }
  .user-card .chev { margin-left:auto; color:rgba(255,255,255,0.5); font-size:20px; }

  /* PIN */
  .pin-screen { display:flex; flex-direction:column; align-items:center; width:100%; }
  .user-avatar-lg {
    width:82px; height:82px; border-radius:50%;
    background:linear-gradient(135deg, #3BA272, #1F4E78);
    color:#fff; display:flex; align-items:center; justify-content:center;
    font-size:32px; font-weight:700;
    margin:0 auto 14px;
    box-shadow:0 10px 28px rgba(0,0,0,0.35);
    border:3px solid rgba(255,255,255,0.18);
  }
  .user-name { color:#fff; font-size:18px; font-weight:600; margin-bottom:6px; letter-spacing:.2px; }
  .user-hint { color:rgba(255,255,255,0.55); font-size:13px; margin-bottom:22px; }
  .pin-dots { display:flex; gap:16px; margin-bottom:28px; justify-content:center; }
  .pin-dot {
    width:14px; height:14px; border-radius:50%;
    background:rgba(255,255,255,0.14);
    border:1.5px solid rgba(255,255,255,0.38);
    transition: all .18s cubic-bezier(.3,.6,.3,1);
  }
  .pin-dot.filled { background:#fff; border-color:#fff; transform:scale(1.18); box-shadow:0 0 12px rgba(255,255,255,0.55); }
  .pin-dot.error { background:var(--warn-2); border-color:var(--warn-2); box-shadow:0 0 12px rgba(255,107,107,0.55); }
  .pin-pad { display:grid; grid-template-columns:repeat(3, 72px); gap:16px; }
  .pin-key {
    width:72px; height:72px; border-radius:50%;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.13);
    color:#fff; font-size:28px; font-weight:500;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all .1s ease;
    user-select:none;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .pin-key:active { background:rgba(255,255,255,0.28); transform:scale(0.92); }
  .pin-key.spacer { visibility:hidden; pointer-events:none; background:transparent; border:none; }
  .pin-key.back   { font-size:22px; background:transparent; border:1px solid rgba(255,255,255,0.08); }
  .pin-err { color:var(--warn-2); font-size:13px; margin-top:16px; min-height:20px; text-align:center; font-weight:500; }
  .pin-switch {
    margin-top:28px; color:rgba(255,255,255,0.72);
    background:none; border:none; font-size:13px; cursor:pointer;
    padding:8px 16px; border-radius:8px;
  }
  .pin-switch:active { background:rgba(255,255,255,0.08); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
  .pin-shake { animation: shake .4s; }

  /* ================= APP (una vez logueado) ================= */
  header { position:sticky; top:0; z-index:10; background:var(--primary); color:#fff; padding:12px 16px; box-shadow:0 2px 8px rgba(0,0,0,.12); }
  header .top { display:flex; justify-content:space-between; align-items:center; gap:10px; }
  header h1 { margin:0; font-size:17px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .user-chip {
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(255,255,255,0.13);
    border:1px solid rgba(255,255,255,0.18);
    border-radius:999px; padding:4px 10px 4px 5px;
    cursor:pointer; color:#fff; font-size:13px;
    transition:background .12s ease;
  }
  .user-chip:active { background:rgba(255,255,255,0.25); }
  .user-chip .avatar-xs {
    width:26px; height:26px; border-radius:50%;
    background:linear-gradient(135deg, #3BA272, #1F4E78);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:12px;
  }
  .user-chip .logout { font-size:15px; opacity:.8; padding-left:2px; }

  .nav-tabs { display:flex; gap:4px; overflow-x:auto; margin-top:10px; padding-bottom:2px; }
  .nav-tabs button { flex-shrink:0; background:rgba(255,255,255,.15); border:none; color:#fff; padding:6px 12px; border-radius:6px; font-size:13px; cursor:pointer; }
  .nav-tabs button.active { background:#fff; color:var(--primary); font-weight:600; }
  main { padding:12px; max-width:800px; margin:0 auto; padding-bottom:90px; }
  .tabs { display:flex; gap:6px; overflow-x:auto; padding:8px 0; margin-bottom:8px; }
  .tab { flex-shrink:0; padding:8px 14px; background:#fff; border:1px solid var(--border); border-radius:999px; font-size:14px; cursor:pointer; color:var(--muted); }
  .tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }
  .search { display:flex; gap:8px; margin-bottom:12px; }
  .search input, .search select { flex:1; padding:12px; border:1px solid var(--border); border-radius:8px; background:#fff; font-size:15px; }
  .card { background:var(--card); border-radius:12px; padding:12px; margin-bottom:10px; box-shadow:0 1px 3px rgba(0,0,0,.05); display:flex; gap:12px; align-items:flex-start; cursor:pointer; }
  .card img { width:64px; height:64px; border-radius:8px; object-fit:cover; background:#eee; flex-shrink:0; }
  .card .info { flex:1; min-width:0; }
  .card .title { font-weight:600; font-size:15px; margin-bottom:4px; }
  .card .sub { color:var(--muted); font-size:13px; margin-bottom:6px; }
  .chips { display:flex; flex-wrap:wrap; gap:4px; }
  .chip { background:#EEF2F7; color:var(--primary); padding:3px 8px; border-radius:12px; font-size:12px; font-weight:500; }
  .chip.warn { background:#FDE8E6; color:var(--warn); }
  .totals { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
  .total-big { font-size:20px; font-weight:700; color:var(--primary); }
  .unit { font-size:11px; color:var(--muted); }
  .badge-warn { background:var(--warn); color:#fff; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
  .fab { position:fixed; bottom:12px; right:12px; left:12px; max-width:760px; margin:0 auto; display:grid; grid-template-columns:repeat(4,1fr); gap:6px; z-index:20; }
  .fab button { padding:12px 6px; border:none; border-radius:10px; font-size:13px; font-weight:600; color:#fff; cursor:pointer; box-shadow:0 4px 12px rgba(0,0,0,.15); }
  .fab .b-in  { background:var(--accent); }
  .fab .b-tr  { background:var(--primary); }
  .fab .b-eg  { background:var(--orange); }
  .fab .b-aj  { background:#6B7280; }

  /* Modal */
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:flex-end; z-index:100; }
  .modal-bg.open { display:flex; }
  .modal { background:#fff; width:100%; max-width:600px; margin:0 auto; border-radius:16px 16px 0 0; padding:18px; max-height:92vh; overflow-y:auto; }
  .modal h2 { margin:0 0 12px; font-size:18px; color:var(--primary); }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:4px; font-weight:500; }
  .field input, .field select, .field textarea { width:100%; padding:12px; border:1px solid var(--border); border-radius:8px; font-size:15px; background:#fff; }
  .field textarea { min-height:60px; resize:vertical; }
  .field .row-with-btn { display:flex; gap:6px; }
  .field .row-with-btn select { flex:1; }
  .field .row-with-btn button { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:0 14px; font-weight:600; cursor:pointer; font-size:13px; }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .toggle-row { display:flex; align-items:center; gap:8px; background:#F4F6F9; padding:10px 12px; border-radius:8px; margin-bottom:8px; }
  .toggle-row input[type=checkbox] { width:18px; height:18px; }
  .toggle-row label { margin:0; font-size:14px; color:var(--text); flex:1; cursor:pointer; }
  .btn-row { display:flex; gap:8px; margin-top:8px; }
  .btn { flex:1; padding:14px; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; }
  .btn-primary { background:var(--primary); color:#fff; }
  .btn-secondary { background:#E3E7ED; color:var(--text); }
  .btn-accent { background:var(--accent); color:#fff; }
  .btn-warn { background:var(--warn); color:#fff; }
  .btn-purple { background:var(--purple); color:#fff; }
  .btn-orange { background:var(--orange); color:#fff; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .alert { padding:10px 12px; border-radius:8px; margin-bottom:10px; font-size:14px; }
  .alert-err { background:#FDE8E6; color:var(--warn); border:1px solid #F5B7B1; }
  .alert-ok  { background:#D5F5E3; color:#1E8449; border:1px solid #ABEBC6; }
  .alert-info { background:#D6EAF8; color:#1B4F72; border:1px solid #AED6F1; }
  .empty { text-align:center; color:var(--muted); padding:40px 20px; }
  .loader { text-align:center; padding:30px; color:var(--muted); }
  .detail-rows .row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:14px; }
  .list-item { background:#fff; border-radius:10px; padding:12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .list-item .info { flex:1; min-width:0; }
  .list-item .info strong { display:block; font-size:15px; margin-bottom:2px; }
  .list-item .info small { color:var(--muted); font-size:12px; }
  .list-item .actions a { text-decoration:none; color:var(--primary); font-weight:600; font-size:13px; padding:8px 12px; border:1px solid var(--primary); border-radius:6px; display:inline-block; }
  .mov-row { display:grid; grid-template-columns:60px 1fr auto; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); font-size:14px; align-items:center; }
  .mov-row .tipo { padding:3px 7px; border-radius:4px; font-size:11px; font-weight:600; color:#fff; text-align:center; }
  .mov-row .tipo.Ingreso { background:var(--accent); }
  .mov-row .tipo.Traslado { background:var(--primary); }
  .mov-row .tipo.Egreso { background:var(--orange); }
  .mov-row .tipo.Ajuste { background:#6B7280; }
  .mov-row .tipo.Reserva { background:var(--purple); }
  .mov-row .tipo.Libera_Reserva { background:#9B59B6; }
  .foto-preview { width:100%; max-height:200px; object-fit:cover; border-radius:8px; margin:8px 0; }
  .qr-preview { display:block; margin:10px auto; max-width:200px; border:1px solid var(--border); border-radius:8px; padding:6px; }
  .hint { font-size:12px; color:var(--muted); margin-top:4px; }
  .hint-strong { background:#FFF3CD; color:#7D5A00; padding:8px 10px; border-radius:6px; font-size:13px; margin-top:6px; }

  .basket-line { background:#F4F6F9; border:1px solid var(--border); border-radius:10px; padding:10px; margin-bottom:8px; position:relative; }
  .basket-line .del-x { position:absolute; top:6px; right:8px; background:none; border:none; color:var(--warn); font-size:18px; cursor:pointer; padding:4px; }
  .basket-line .head { font-weight:600; padding-right:24px; margin-bottom:6px; }
  .basket-line small { color:var(--muted); }
  .add-line-btn { background:#E3E7ED; color:var(--text); border:1px dashed var(--muted); border-radius:10px; padding:10px; width:100%; font-weight:600; cursor:pointer; margin-bottom:8px; }

  /* App oculto hasta login */
  .app-hidden { display:none !important; }
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="login-view">
  <div class="login-logo">📦</div>
  <h1 class="login-title">Stock · Galpones</h1>
  <div class="login-sub" id="login-sub">Elegí tu usuario</div>

  <!-- Paso 1: seleccionar usuario -->
  <div id="login-users" class="user-pick"></div>

  <!-- Paso 2: PIN -->
  <div id="login-pin" class="pin-screen" style="display:none;">
    <div class="user-avatar-lg" id="pin-avatar"></div>
    <div class="user-name" id="pin-name"></div>
    <div class="user-hint">Ingresá tu PIN</div>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
    </div>
    <div class="pin-pad" id="pin-pad">
      <button type="button" class="pin-key" onclick="pinDigit('1')">1</button>
      <button type="button" class="pin-key" onclick="pinDigit('2')">2</button>
      <button type="button" class="pin-key" onclick="pinDigit('3')">3</button>
      <button type="button" class="pin-key" onclick="pinDigit('4')">4</button>
      <button type="button" class="pin-key" onclick="pinDigit('5')">5</button>
      <button type="button" class="pin-key" onclick="pinDigit('6')">6</button>
      <button type="button" class="pin-key" onclick="pinDigit('7')">7</button>
      <button type="button" class="pin-key" onclick="pinDigit('8')">8</button>
      <button type="button" class="pin-key" onclick="pinDigit('9')">9</button>
      <button type="button" class="pin-key spacer" tabindex="-1"></button>
      <button type="button" class="pin-key" onclick="pinDigit('0')">0</button>
      <button type="button" class="pin-key back" onclick="pinBack()">⌫</button>
    </div>
    <div class="pin-err" id="pin-err"></div>
    <button type="button" class="pin-switch" onclick="showUserPicker()">← Cambiar usuario</button>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app-root" class="app-hidden">

<header>
  <div class="top">
    <h1>📦 Stock · Galpones</h1>
    <div class="user-chip" onclick="confirmLogout()" title="Cerrar sesión">
      <div class="avatar-xs" id="hdr-avatar">?</div>
      <span id="hdr-nombre">—</span>
      <span class="logout">⏻</span>
    </div>
  </div>
  <div class="nav-tabs" id="nav-tabs">
    <button data-view="stock" class="active" onclick="showView('stock')">Stock</button>
    <button data-view="productos" onclick="showView('productos')">Productos</button>
    <button data-view="zonas" onclick="showView('zonas')">Zonas</button>
    <button data-view="obras" onclick="showView('obras')">Obras</button>
  </div>
</header>

<main>

<!-- Vista: Stock -->
<div id="view-stock">
  <div class="tabs" id="zona-tabs"></div>
  <div class="search">
    <input type="text" id="search-input" placeholder="Buscar por nombre o SKU..." oninput="renderStock()">
    <select id="cat-filter" onchange="renderStock()"><option value="">Todas las categorías</option></select>
  </div>
  <div id="stock-list"><div class="loader">Cargando stock...</div></div>
</div>

<!-- Vista: Productos -->
<div id="view-productos" style="display:none;">
  <div style="display:flex;gap:8px;margin-bottom:12px;">
    <input type="text" id="prod-search" placeholder="Buscar producto..." oninput="renderProductos()" style="flex:1;padding:12px;border:1px solid var(--border);border-radius:8px;">
    <button class="btn btn-accent" style="flex:none;padding:12px 16px;" onclick="openNuevoProducto()">+ Nuevo</button>
  </div>
  <div id="productos-list"></div>
</div>

<!-- Vista: Zonas -->
<div id="view-zonas" style="display:none;">
  <h3 style="margin-top:0;color:var(--primary);">Galpones y depósitos</h3>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
    <button class="btn btn-accent" onclick="openNuevoDeposito()" style="padding:10px 16px;">+ Nuevo depósito</button>
    <button class="btn btn-primary" onclick="openMapaZonas()" style="padding:10px 16px;">📍 Ver depósitos en mapa</button>
  </div>
  <div id="zonas-list"></div>
</div>

<!-- Vista: Obras -->
<div id="view-obras" style="display:none;">
  <h3 style="margin-top:0;color:var(--primary);">Obras</h3>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
    <button class="btn btn-accent" onclick="openNuevaObra()" style="padding:10px 16px;">+ Nueva obra</button>
    <button class="btn btn-primary" onclick="openMapaObras()" style="padding:10px 16px;">📍 Ver obras en mapa</button>
  </div>
  <div id="obras-list"></div>
</div>

</main>

<!-- FAB -->
<div class="fab" id="fab">
  <button class="b-in" onclick="openMovimiento('Ingreso')">+ Ingreso</button>
  <button class="b-tr" onclick="openMovimiento('Traslado')">↔ Traslado</button>
  <button class="b-eg" onclick="openEgresoMasivo()">→ Egreso</button>
  <button class="b-aj" onclick="openMovimiento('Ajuste')">± Ajuste</button>
</div>

<!-- Modal genérico -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this) closeModal()">
  <div class="modal" id="modal"></div>
</div>

</div><!-- /#app-root -->

<script>
// ============== CONFIGURACIÓN HARDCODEADA ==============
const API_URL   = 'https://script.google.com/macros/s/AKfycbwJGWoCi3004QpbwVdM_4EGp-K64ZcQhuzHUhdQ9KypaEEGcOyHVmesmU-xh8M_vrw/exec';
const API_TOKEN = 'el_inventario_123_de_Eze';
// =======================================================

// SVG "sin foto" — pre-codificado para que el onerror funcione sin escapes raros.
const NO_FOTO = 'data:image/svg+xml;utf8,' + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64"><rect width="64" height="64" fill="#E3E7ED"/><text x="32" y="38" text-anchor="middle" font-size="28" fill="#6B7280">&#128230;</text></svg>'
);
window.NO_FOTO = NO_FOTO;

// Helpers de escape
function attrEsc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;')
    .replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function jsStr(s) {
  return "'" + String(s == null ? '' : s).replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "'";
}
function initialsOf(name) {
  const t = (name || '?').trim();
  if (!t) return '?';
  const parts = t.split(/\s+/).filter(Boolean);
  return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
}

// ============== ESTADO ==============
let STATE = {
  productos: [], zonas: [], obras: [], categorias: [], stock: [],
  currentZone: 'TODAS',
  egresoBasket: [],
};
let USUARIOS_LIST = [];  // cache de getUsuarios
let SESSION = null;      // { user, nombre }
let PIN_BUF = '';
let SEL_USER = null;     // usuario seleccionado en el login pre-PIN

// ============== SESIÓN ==============
function loadSession() {
  try {
    const raw = sessionStorage.getItem('stock_session');
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (s && s.user && s.nombre) return s;
  } catch (_) {}
  return null;
}
function saveSession(s) { sessionStorage.setItem('stock_session', JSON.stringify(s)); }
function clearSession() { sessionStorage.removeItem('stock_session'); }

// ============== API ==============
// ---- Saving overlay (blur + spinner) ----
function _ensureSaving() {
  if (document.getElementById('saving-overlay')) return;
  const css = document.createElement('style');
  css.textContent = `
    .saving-overlay{position:fixed;inset:0;background:rgba(11,31,53,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:99999}
    .saving-overlay.show{display:flex}
    .saving-box{background:#fff;padding:22px 28px;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.35);display:flex;align-items:center;gap:14px;font-weight:700;color:var(--primary);font-size:16px}
    .saving-spin{width:22px;height:22px;border:3px solid #E3E7ED;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  `;
  document.head.appendChild(css);
  const el = document.createElement('div');
  el.id = 'saving-overlay'; el.className = 'saving-overlay';
  el.innerHTML = '<div class="saving-box"><div class="saving-spin"></div><span id="saving-msg">Guardando...</span></div>';
  document.body.appendChild(el);
}
function showSaving(msg){_ensureSaving();document.getElementById('saving-msg').textContent=msg||'Guardando...';document.getElementById('saving-overlay').classList.add('show');}
function hideSaving(){const el=document.getElementById('saving-overlay');if(el)el.classList.remove('show');}

// Actions que son de escritura (muestran overlay)
const _WRITE_ACTIONS = ['addMovimiento','addProducto','addObra','addZona','uploadFoto','generarQR','sincronizarFotos','login'];

async function api(action, extra = {}, method = 'GET') {
  const isWrite = _WRITE_ACTIONS.indexOf(action) !== -1;
  if (isWrite) showSaving(action === 'uploadFoto' ? 'Subiendo foto...' : action === 'generarQR' ? 'Generando QR...' : 'Guardando...');
  try {
    if (method === 'POST') {
      const body = JSON.stringify({ action, token: API_TOKEN, ...extra });
      const res = await fetch(API_URL, { method:'POST', headers:{ 'Content-Type':'text/plain;charset=utf-8' }, body });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      return data.data;
    } else {
      const params = new URLSearchParams({ action, token: API_TOKEN, ...extra });
      const res = await fetch(API_URL + '?' + params.toString(), { method: 'GET' });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      return data.data;
    }
  } finally {
    if (isWrite) hideSaving();
  }
}
async function apiPostJSON(action, extra = {}) {
  const body = JSON.stringify({ action, token: API_TOKEN, ...extra });
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json;charset=utf-8' },
    body, redirect: 'follow',
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error);
  return data.data;
}

// ============== LOGIN FLOW ==============
async function bootLogin() {
  document.getElementById('login-view').classList.add('open');
  document.getElementById('app-root').classList.add('app-hidden');
  const sub = document.getElementById('login-sub');
  sub.textContent = 'Cargando usuarios...';
  try {
    USUARIOS_LIST = await api('getUsuarios');
  } catch (err) {
    sub.innerHTML = '<span style="color:#FF9B9B">No pude conectar con el servidor:<br>' + attrEsc(err.message) + '</span>';
    return;
  }
  if (!USUARIOS_LIST.length) {
    sub.innerHTML = '<span style="color:#FF9B9B">No hay usuarios cargados en el Apps Script.</span>';
    return;
  }
  // Si hay un solo usuario, saltamos directo al PIN
  if (USUARIOS_LIST.length === 1) {
    selectUser(USUARIOS_LIST[0]);
    return;
  }
  showUserPicker();
}

function showUserPicker() {
  document.getElementById('login-sub').textContent = 'Elegí tu usuario';
  document.getElementById('login-users').style.display = '';
  document.getElementById('login-pin').style.display = 'none';
  document.getElementById('login-users').innerHTML = USUARIOS_LIST.map(u => `
    <div class="user-card" onclick='selectUser(${jsStr(JSON.stringify(u))})'>
      <div class="avatar-sm">${attrEsc(initialsOf(u.nombre))}</div>
      <div class="t"><strong>${attrEsc(u.nombre)}</strong><small>${attrEsc(u.user)}</small></div>
      <div class="chev">›</div>
    </div>
  `).join('');
}

function selectUser(u) {
  if (typeof u === 'string') u = JSON.parse(u);
  SEL_USER = u;
  PIN_BUF = '';
  document.getElementById('login-sub').textContent = '';
  document.getElementById('login-users').style.display = 'none';
  document.getElementById('login-pin').style.display = 'flex';
  document.getElementById('pin-avatar').textContent = initialsOf(u.nombre);
  document.getElementById('pin-name').textContent = u.nombre;
  document.getElementById('pin-err').textContent = '';
  renderPinDots();
}

function renderPinDots(errorFlash) {
  const dots = document.querySelectorAll('#pin-dots .pin-dot');
  dots.forEach((d, i) => {
    d.className = 'pin-dot'
      + (i < PIN_BUF.length ? ' filled' : '')
      + (errorFlash ? ' error' : '');
  });
}

function pinDigit(d) {
  if (!SEL_USER) return;
  if (PIN_BUF.length >= 4) return;
  PIN_BUF += d;
  renderPinDots();
  if (PIN_BUF.length === 4) tryLogin();
}
function pinBack() {
  PIN_BUF = PIN_BUF.slice(0, -1);
  renderPinDots();
  document.getElementById('pin-err').textContent = '';
}

async function tryLogin() {
  const errEl = document.getElementById('pin-err');
  errEl.textContent = '';
  try {
    const res = await api('login', { user: SEL_USER.user, pin: PIN_BUF });
    SESSION = { user: res.user, nombre: res.nombre };
    saveSession(SESSION);
    PIN_BUF = '';
    enterApp();
  } catch (err) {
    errEl.textContent = err.message || 'PIN incorrecto';
    renderPinDots(true);
    const pad = document.getElementById('login-pin');
    pad.classList.add('pin-shake');
    setTimeout(() => { pad.classList.remove('pin-shake'); PIN_BUF = ''; renderPinDots(); }, 420);
  }
}

// soporte de teclado físico (PC / tablet con teclado)
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('login-view').classList.contains('open')) return;
  if (!SEL_USER) return;
  if (/^[0-9]$/.test(e.key)) { pinDigit(e.key); e.preventDefault(); }
  else if (e.key === 'Backspace') { pinBack(); e.preventDefault(); }
});

// ============== LOGOUT ==============
function confirmLogout() {
  if (!confirm('¿Cerrar sesión?')) return;
  clearSession();
  SESSION = null;
  document.getElementById('app-root').classList.add('app-hidden');
  bootLogin();
}

// ============== INICIO ==============
async function enterApp() {
  document.getElementById('login-view').classList.remove('open');
  document.getElementById('app-root').classList.remove('app-hidden');
  // pintar chip de usuario
  document.getElementById('hdr-avatar').textContent = initialsOf(SESSION.nombre);
  document.getElementById('hdr-nombre').textContent = SESSION.nombre;
  await init();
}

async function init() {
  try {
    const [productos, zonas, obras, categorias, stock] = await Promise.all([
      api('getProducts'),
      api('getZones'),
      api('getObras'),
      api('getCategorias'),
      api('getStock'),
    ]);
    STATE.productos = productos;
    STATE.zonas = zonas;
    STATE.obras = obras;
    STATE.categorias = categorias;
    STATE.stock = stock;
    renderZonas();
    renderCategorias();
    renderStock();
    renderProductos();
    renderZonasView();
    renderObrasView();
    return true;
  } catch (err) {
    document.getElementById('stock-list').innerHTML = `<div class="alert alert-err">${attrEsc(err.message)}</div>`;
    return false;
  }
}

// ============== HELPERS STOCK ==============
function getStockRow(sku) { return STATE.stock.find(x => x.SKU === sku); }
function getStockEnZona(sku, zona) { const r = getStockRow(sku); return r ? Number(r[zona] || 0) : 0; }
function getZonasConStock(sku) {
  const r = getStockRow(sku);
  if (!r) return [];
  return STATE.zonas.filter(z => Number(r[z.Codigo] || 0) > 0);
}
function productosConStock() {
  return STATE.productos.filter(p => {
    const r = getStockRow(p.SKU);
    return r && Number(r.Disponible || 0) > 0;
  });
}

// ============== RENDER: STOCK ==============
function renderZonas() {
  const tabs = document.getElementById('zona-tabs');
  tabs.innerHTML = '';
  const all = [{Codigo:'TODAS', Nombre:'Todas'}, ...STATE.zonas];
  all.forEach(z => {
    const t = document.createElement('button');
    t.className = 'tab' + (STATE.currentZone === z.Codigo ? ' active' : '');
    t.textContent = z.Nombre;
    t.onclick = () => { STATE.currentZone = z.Codigo; renderZonas(); renderStock(); };
    tabs.appendChild(t);
  });
  const alert = document.createElement('button');
  alert.className = 'tab' + (STATE.currentZone === 'ALERTAS' ? ' active' : '');
  alert.textContent = '⚠ Alertas';
  alert.onclick = () => { STATE.currentZone = 'ALERTAS'; renderZonas(); renderStock(); };
  tabs.appendChild(alert);
}

function renderCategorias() {
  const sel = document.getElementById('cat-filter');
  const cats = [...new Set(STATE.categorias.map(c => c.Categoria))];
  sel.innerHTML = '<option value="">Todas las categorías</option>' +
    cats.map(c => `<option value="${attrEsc(c)}">${attrEsc(c)}</option>`).join('');
}

function renderStock() {
  const list = document.getElementById('stock-list');
  const search = (document.getElementById('search-input').value || '').toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  let rows = STATE.stock.filter(r => r.SKU);
  if (STATE.currentZone === 'ALERTAS') rows = rows.filter(r => r.Alerta === 'BAJO STOCK');
  if (search) rows = rows.filter(r =>
    (r.Nombre || '').toString().toLowerCase().includes(search) ||
    (r.SKU || '').toString().toLowerCase().includes(search));
  if (cat) rows = rows.filter(r => r.Categoria === cat);
  if (STATE.currentZone !== 'TODAS' && STATE.currentZone !== 'ALERTAS') {
    rows = rows.filter(r => Number(r[STATE.currentZone] || 0) > 0);
  }
  if (rows.length === 0) { list.innerHTML = '<div class="empty">Sin resultados</div>'; return; }
  list.innerHTML = rows.map(r => {
    const prod = STATE.productos.find(p => p.SKU === r.SKU) || {};
    const foto = prod.Foto_URL || NO_FOTO;
    const chips = STATE.zonas
      .filter(z => Number(r[z.Codigo] || 0) > 0)
      .map(z => `<span class="chip">${attrEsc(z.Nombre)}: ${r[z.Codigo]}</span>`).join('');
    const alerta = r.Alerta === 'BAJO STOCK' ? '<span class="badge-warn">Bajo stock</span>' : '';
    return `
      <div class="card" onclick='showDetalle(${jsStr(r.SKU)})'>
        <img src="${attrEsc(foto)}" alt="" onerror="this.src=window.NO_FOTO">
        <div class="info">
          <div class="title">${attrEsc(r.Nombre || r.SKU)} ${alerta}</div>
          <div class="sub">${attrEsc(r.SKU)} · ${attrEsc(r.Categoria || '')}</div>
          <div class="chips">${chips || '<span class="chip">Sin stock</span>'}</div>
        </div>
        <div class="totals">
          <div class="total-big">${Number(r.Disponible || 0)}</div>
          <div class="unit">${attrEsc(r.Unidad || '')} disp.</div>
          ${Number(r.Reservado || 0) > 0 ? `<div class="unit" style="color:var(--purple)">Res: ${r.Reservado}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

// ============== MOVIMIENTOS ==============
function openMovimiento(tipo, skuPreseleccionado) {
  if (tipo === 'Egreso') { openEgresoMasivo(skuPreseleccionado); return; }

  const filtrarPorStock = (tipo === 'Traslado' || tipo === 'Reserva' || tipo === 'Libera_Reserva');
  const productosList = filtrarPorStock ? productosConStock() : STATE.productos;

  const productoOptions = productosList.map(p =>
    `<option value="${attrEsc(p.SKU)}" ${p.SKU === skuPreseleccionado ? 'selected' : ''}>${attrEsc(p.SKU)} — ${attrEsc(p.Nombre)}</option>`).join('');
  const zonaOptions = STATE.zonas.map(z => `<option value="${attrEsc(z.Codigo)}">${attrEsc(z.Nombre)}</option>`).join('');
  const obraOptions = STATE.obras.filter(o => o.Estado !== 'Finalizada')
    .map(o => `<option value="${attrEsc(o.Codigo)}">${attrEsc(o.Codigo)} — ${attrEsc(o.Nombre)}</option>`).join('');

  let packBlock = '';
  if (tipo === 'Ingreso' || tipo === 'Traslado') {
    packBlock = `
      <div class="toggle-row" id="pack-toggle-row" style="display:none;">
        <input type="checkbox" id="f-usar-pack" onchange="actualizarPackIngreso()">
        <label for="f-usar-pack" id="pack-label">Cargar por pack</label>
      </div>
      <div id="pack-result" class="hint" style="margin-top:-4px;"></div>
    `;
  }

  let formFields = `
    <div class="field">
      <label>Producto</label>
      <div class="row-with-btn">
        <select id="f-sku" onchange="onSkuChangeMov('${tipo}')"><option value="">-- elegir --</option>${productoOptions}</select>
        <button type="button" onclick="openNuevoProducto()">+ Nuevo</button>
      </div>
      <div class="hint" id="f-sku-hint"></div>
    </div>
    ${packBlock}
    <div class="field">
      <label><span id="f-cant-label">Cantidad</span></label>
      <input type="number" id="f-cant" step="0.01" inputmode="decimal" oninput="actualizarPackIngreso(); validarCantMov('${tipo}')">
      <div class="hint" id="f-cant-hint"></div>
    </div>
  `;

  if (tipo === 'Ingreso') {
    formFields += `<div class="field"><label>Zona destino</label><select id="f-dest"><option value="">-- elegir --</option>${zonaOptions}</select></div>`;
  } else if (tipo === 'Traslado') {
    formFields += `
      <div class="field"><label>Zona origen</label><select id="f-origen" onchange="validarCantMov('Traslado')"><option value="">-- elegir --</option>${zonaOptions}</select></div>
      <div class="field"><label>Zona destino</label><select id="f-dest"><option value="">-- elegir --</option>${zonaOptions}</select></div>`;
  } else if (tipo === 'Reserva' || tipo === 'Libera_Reserva') {
    formFields += `
      <div class="field"><label>Zona origen</label><select id="f-origen" onchange="validarCantMov('${tipo}')"><option value="">-- elegir --</option>${zonaOptions}</select></div>
      <div class="field">
        <label>Obra</label>
        <div class="row-with-btn">
          <select id="f-obra"><option value="">-- elegir --</option>${obraOptions}</select>
          <button type="button" onclick="openNuevaObra()">+ Nueva</button>
        </div>
      </div>`;
  } else if (tipo === 'Ajuste') {
    formFields += `<div class="field"><label>Zona</label><select id="f-origen"><option value="">-- elegir --</option>${zonaOptions}</select></div>
                   <div class="field"><label>Motivo</label><select id="f-motivo">
                     <option value="Rotura">Rotura</option>
                     <option value="Error conteo">Error conteo</option>
                     <option value="Pérdida/robo">Pérdida/robo</option>
                     <option value="Inventario inicial">Inventario inicial</option>
                   </select></div>
                   <div class="hint" style="color:var(--warn)">⚠ Para restar stock, poné la cantidad en negativo (ej: -5). Para sumar, positivo.</div>`;
  }

  formFields += `<div class="field"><label>Notas (opcional)</label><textarea id="f-notas"></textarea></div>`;

  openModal(`
    <h2>${tipoLabel(tipo)}</h2>
    <div id="mov-msg"></div>
    ${formFields}
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-mov" onclick="submitMovimiento('${tipo}')">Guardar</button>
    </div>
  `);

  if (skuPreseleccionado) onSkuChangeMov(tipo);
}

function onSkuChangeMov(tipo) {
  const sku = document.getElementById('f-sku').value;
  const prod = STATE.productos.find(p => p.SKU === sku);
  const hint = document.getElementById('f-sku-hint');
  const packRow = document.getElementById('pack-toggle-row');

  if (!prod) {
    if (hint) hint.textContent = '';
    if (packRow) packRow.style.display = 'none';
    return;
  }

  const lbl = document.getElementById('f-cant-label');
  if (lbl) lbl.textContent = `Cantidad (${prod.Unidad || ''})`;

  if (tipo === 'Ingreso' && prod.Unidad_Pack && Number(prod.Cantidad_Por_Pack) > 0) {
    if (packRow) {
      packRow.style.display = 'flex';
      document.getElementById('pack-label').textContent =
        `Cargar por ${prod.Unidad_Pack} (1 ${prod.Unidad_Pack} = ${prod.Cantidad_Por_Pack} ${prod.Unidad || ''})`;
    }
  } else if (packRow) {
    packRow.style.display = 'none';
    const chk = document.getElementById('f-usar-pack');
    if (chk) chk.checked = false;
  }

  actualizarPackIngreso();
  validarCantMov(tipo);
}

function actualizarPackIngreso() {
  const r = document.getElementById('pack-result');
  if (!r) return;
  const chk = document.getElementById('f-usar-pack');
  const sku = document.getElementById('f-sku').value;
  const prod = STATE.productos.find(p => p.SKU === sku);
  const cant = parseFloat(document.getElementById('f-cant').value || '0');
  if (chk && chk.checked && prod && Number(prod.Cantidad_Por_Pack) > 0 && cant > 0) {
    const total = cant * Number(prod.Cantidad_Por_Pack);
    r.innerHTML = `<span style="color:var(--accent);font-weight:600">→ Se van a ingresar <strong>${total}</strong> ${prod.Unidad || ''} (${cant} × ${prod.Cantidad_Por_Pack})</span>`;
  } else {
    r.innerHTML = '';
  }
}

function validarCantMov(tipo) {
  const hint = document.getElementById('f-cant-hint');
  const btn = document.getElementById('btn-guardar-mov');
  if (!hint || !btn) return;
  hint.innerHTML = '';
  btn.disabled = false;
  if (tipo !== 'Traslado' && tipo !== 'Reserva') return;

  const sku = document.getElementById('f-sku').value;
  const zo = document.getElementById('f-origen') ? document.getElementById('f-origen').value : '';
  if (!sku || !zo) return;
  const disp = getStockEnZona(sku, zo);
  const cant = parseFloat(document.getElementById('f-cant').value || '0');
  hint.innerHTML = `<span style="color:var(--muted)">Disponible en esa zona: <strong>${disp}</strong></span>`;
  if (cant > 0 && cant > disp) {
    hint.innerHTML = `<span style="color:var(--warn)">⚠ Excede lo disponible (${disp}). No vas a poder guardar.</span>`;
    btn.disabled = true;
  }
}

function tipoLabel(t) {
  return {
    Ingreso: '+ Nuevo Ingreso',
    Traslado: '↔ Traslado entre galpones',
    Egreso: '→ Egreso a Obra',
    Ajuste: '± Ajuste de stock',
    Reserva: '📌 Reservar para Obra',
    Libera_Reserva: '↺ Liberar reserva',
  }[t] || t;
}

async function submitMovimiento(tipo) {
  try {
    let cantidad = parseFloat(document.getElementById('f-cant').value || '0');
    const sku = document.getElementById('f-sku').value;
    const prod = STATE.productos.find(p => p.SKU === sku);

    if (tipo === 'Ingreso' || tipo === 'Traslado') {
      const chk = document.getElementById('f-usar-pack');
      if (chk && chk.checked && prod && Number(prod.Cantidad_Por_Pack) > 0) {
        cantidad = cantidad * Number(prod.Cantidad_Por_Pack);
      }
    }

    const payload = {
      tipo, sku, cantidad,
      usuario: SESSION ? SESSION.user : '',
      notas: document.getElementById('f-notas').value,
    };
    if (tipo === 'Ingreso') payload.zonaDestino = document.getElementById('f-dest').value;
    if (tipo === 'Traslado') {
      payload.zonaOrigen = document.getElementById('f-origen').value;
      payload.zonaDestino = document.getElementById('f-dest').value;
    }
    if (tipo === 'Reserva' || tipo === 'Libera_Reserva') {
      payload.zonaOrigen = document.getElementById('f-origen').value;
      payload.obra = document.getElementById('f-obra').value;
    }
    if (tipo === 'Ajuste') {
      payload.zonaOrigen = document.getElementById('f-origen').value;
      payload.motivo = document.getElementById('f-motivo').value;
      // Confirmación: detecta signo → Ingreso/Egreso
      const signo = cantidad >= 0 ? 'Ingreso' : 'Egreso';
      const abs = Math.abs(cantidad);
      const nomProd = prod ? prod.Nombre : sku;
      const unidad = prod && prod.Unidad ? ' ' + prod.Unidad : '';
      const motivo = payload.motivo || '(sin motivo)';
      if (!confirm(`¿Confirmás este ${signo} de ${abs}${unidad} de "${nomProd}" por "${motivo}"?`)) return;
    }
    await api('addMovimiento', payload);
    document.getElementById('mov-msg').innerHTML = `<div class="alert alert-ok">Movimiento registrado ✓</div>`;
    setTimeout(() => { closeModal(); init(); }, 600);
  } catch (err) {
    document.getElementById('mov-msg').innerHTML = `<div class="alert alert-err">${attrEsc(err.message)}</div>`;
  }
}

function openEgresoMasivo(skuPreseleccionado) {
  STATE.egresoBasket = [];
  if (skuPreseleccionado) {
    const prod = STATE.productos.find(p => p.SKU === skuPreseleccionado);
    if (prod) {
      const zonas = getZonasConStock(skuPreseleccionado);
      if (zonas.length > 0) {
        STATE.egresoBasket.push({ sku: skuPreseleccionado, zona: zonas[0].Codigo, cantidad: '' });
      }
    }
  }
  if (STATE.egresoBasket.length === 0) {
    STATE.egresoBasket.push({ sku: '', zona: '', cantidad: '' });
  }

  const obraOptions = STATE.obras.filter(o => o.Estado !== 'Finalizada')
    .map(o => `<option value="${attrEsc(o.Codigo)}">${attrEsc(o.Codigo)} — ${attrEsc(o.Nombre)}</option>`).join('');

  openModal(`
    <h2>→ Egreso a Obra</h2>
    <div id="mov-msg"></div>
    <div class="field">
      <label>Obra *</label>
      <div class="row-with-btn">
        <select id="eg-obra"><option value="">-- elegir --</option>${obraOptions}</select>
        <button type="button" onclick="openNuevaObra()">+ Nueva</button>
      </div>
    </div>
    <div class="field"><label>Notas (se aplican a todos)</label><textarea id="eg-notas" placeholder="ej: remito, camión, quien retiró"></textarea></div>
    <h3 style="color:var(--orange);font-size:15px;margin:10px 0 6px;">🛒 Productos a retirar</h3>
    <div id="eg-basket"></div>
    <button class="add-line-btn" onclick="egregarLinea()">+ Agregar otro producto</button>
    <div class="hint" id="eg-summary" style="text-align:right;"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-orange" id="eg-btn" onclick="submitEgresoMasivo()">Guardar todo</button>
    </div>
  `);
  renderEgresoBasket();
}

function egregarLinea() { STATE.egresoBasket.push({ sku: '', zona: '', cantidad: '' }); renderEgresoBasket(); }
function egQuitarLinea(idx) {
  STATE.egresoBasket.splice(idx, 1);
  if (STATE.egresoBasket.length === 0) egregarLinea();
  renderEgresoBasket();
}
function onEgSkuChange(idx, value) {
  STATE.egresoBasket[idx].sku = value;
  const zonas = getZonasConStock(value);
  const actual = STATE.egresoBasket[idx].zona;
  if (!zonas.find(z => z.Codigo === actual)) {
    STATE.egresoBasket[idx].zona = zonas.length > 0 ? zonas[0].Codigo : '';
  }
  renderEgresoBasket();
}
function onEgZonaChange(idx, value) { STATE.egresoBasket[idx].zona = value; renderEgresoBasket(); }
function onEgCantChange(idx, value) { STATE.egresoBasket[idx].cantidad = value; validarEgresoBasket(); }

function renderEgresoBasket() {
  const c = document.getElementById('eg-basket');
  if (!c) return;
  const prodElegibles = productosConStock();

  c.innerHTML = STATE.egresoBasket.map((line, idx) => {
    const prod = STATE.productos.find(p => p.SKU === line.sku);
    const zonasConStock = line.sku ? getZonasConStock(line.sku) : [];

    const prodOpts = prodElegibles.map(p =>
      `<option value="${attrEsc(p.SKU)}" ${line.sku === p.SKU ? 'selected' : ''}>${attrEsc(p.SKU)} — ${attrEsc(p.Nombre)}</option>`
    ).join('');

    const zonaOpts = zonasConStock.map(z => {
      const st = getStockEnZona(line.sku, z.Codigo);
      return `<option value="${attrEsc(z.Codigo)}" ${line.zona === z.Codigo ? 'selected' : ''}>${attrEsc(z.Nombre)} (disp: ${st})</option>`;
    }).join('');

    const dispLinea = line.sku && line.zona ? getStockEnZona(line.sku, line.zona) : 0;
    const cantNum = parseFloat(line.cantidad || '0');
    const excede = cantNum > 0 && cantNum > dispLinea;

    return `
      <div class="basket-line">
        <button class="del-x" onclick="egQuitarLinea(${idx})" title="Quitar">✕</button>
        <div class="head">Producto ${idx + 1}</div>
        <div class="field">
          <select onchange="onEgSkuChange(${idx}, this.value)">
            <option value="">-- elegir producto --</option>
            ${prodElegibles.length === 0 ? '<option disabled>No hay productos con stock</option>' : ''}
            ${prodOpts}
          </select>
        </div>
        ${line.sku ? `
          <div class="field-row">
            <div class="field">
              <label>Zona origen</label>
              <select onchange="onEgZonaChange(${idx}, this.value)">
                ${zonasConStock.length ? zonaOpts : '<option value="">Sin stock en ningún galpón</option>'}
              </select>
            </div>
            <div class="field">
              <label>Cantidad${prod ? ' (' + attrEsc(prod.Unidad || '') + ')' : ''}</label>
              <input type="number" step="0.01" inputmode="decimal" value="${attrEsc(line.cantidad)}" oninput="onEgCantChange(${idx}, this.value)">
            </div>
          </div>
          ${excede ? `<div class="alert alert-err" style="margin:4px 0 0;">⚠ Excede lo disponible (${dispLinea} ${prod ? attrEsc(prod.Unidad || '') : ''})</div>` : ''}
        ` : ''}
      </div>`;
  }).join('');

  validarEgresoBasket();
}

function validarEgresoBasket() {
  const btn = document.getElementById('eg-btn');
  const sum = document.getElementById('eg-summary');
  if (!btn) return;
  let anyLineOk = false, anyBad = false;
  const acc = {};
  for (const l of STATE.egresoBasket) {
    const cant = parseFloat(l.cantidad || '0');
    if (!l.sku || !l.zona || !(cant > 0)) continue;
    const key = l.sku + '||' + l.zona;
    acc[key] = (acc[key] || 0) + cant;
    anyLineOk = true;
  }
  for (const key of Object.keys(acc)) {
    const [sku, zona] = key.split('||');
    if (acc[key] > getStockEnZona(sku, zona)) anyBad = true;
  }
  btn.disabled = !anyLineOk || anyBad;
  if (sum) {
    const lineasOk = Object.keys(acc).length;
    sum.textContent = lineasOk ? `${lineasOk} ${lineasOk === 1 ? 'producto listo' : 'productos listos'} para egresar` : '';
  }
}

async function submitEgresoMasivo() {
  const obra = document.getElementById('eg-obra').value;
  const notas = document.getElementById('eg-notas').value;
  if (!obra) { document.getElementById('mov-msg').innerHTML = '<div class="alert alert-err">Elegí una obra</div>'; return; }

  const lineas = STATE.egresoBasket.filter(l => {
    const c = parseFloat(l.cantidad || '0');
    return l.sku && l.zona && c > 0;
  });
  if (lineas.length === 0) { document.getElementById('mov-msg').innerHTML = '<div class="alert alert-err">Cargá al menos un producto</div>'; return; }

  document.getElementById('mov-msg').innerHTML = `<div class="alert alert-info">Guardando ${lineas.length} egresos...</div>`;

  let okCount = 0, errs = [];
  for (const l of lineas) {
    try {
      await api('addMovimiento', {
        tipo: 'Egreso', sku: l.sku, cantidad: parseFloat(l.cantidad),
        zonaOrigen: l.zona, obra,
        usuario: SESSION ? SESSION.user : '',
        notas,
      });
      okCount++;
    } catch (err) {
      errs.push(`${l.sku}: ${err.message}`);
    }
  }
  if (errs.length === 0) {
    document.getElementById('mov-msg').innerHTML = `<div class="alert alert-ok">${okCount} egresos registrados ✓</div>`;
    setTimeout(() => { closeModal(); init(); }, 700);
  } else {
    document.getElementById('mov-msg').innerHTML =
      `<div class="alert alert-ok">${okCount} OK</div>` +
      `<div class="alert alert-err">${errs.length} con error:<br>${errs.map(attrEsc).join('<br>')}</div>`;
    init();
  }
}

async function submitProducto() {
  try {
    const usePack = document.getElementById('p-use-pack').checked;
    // Resolver cat/subcat (con soporte inline "Nueva")
    let categoria = document.getElementById('p-cat').value;
    if (categoria === '__NEW__') categoria = (document.getElementById('p-cat-new').value || '').trim();
    let subcategoria = document.getElementById('p-subcat').value;
    if (subcategoria === '__NEW__') subcategoria = (document.getElementById('p-subcat-new').value || '').trim();
    if (!categoria) throw new Error('Falta categoría');

    const payload = {
      sku: document.getElementById('p-sku').value.trim(),
      nombre: document.getElementById('p-nom').value.trim(),
      categoria, subcategoria,
      unidad: document.getElementById('p-unidad').value,
      stockMinimo: document.getElementById('p-min').value,
      notas: document.getElementById('p-notas').value,
      unidadPack: usePack ? document.getElementById('p-upack').value : '',
      cantidadPack: usePack ? document.getElementById('p-cpack').value : '',
    };
    const res = await api('addProducto', payload);
    const sku = res.sku;

    // Stock inicial: si se cargó cantidad+zona, hacer el ingreso automáticamente
    const stockIni = parseFloat(document.getElementById('p-stock').value || '0');
    const zonaIni  = document.getElementById('p-stock-zona').value;
    let msg = `Producto creado ✓ SKU: <strong>${attrEsc(sku)}</strong>`;
    if (stockIni > 0 && zonaIni) {
      await api('addMovimiento', {
        tipo: 'Ingreso', sku, cantidad: stockIni, zonaDestino: zonaIni,
        usuario: SESSION ? SESSION.user : '', notas: 'Stock inicial (alta de producto)',
      });
      msg += `<br>+ ingreso inicial de <strong>${stockIni}</strong> en <strong>${attrEsc(zonaIni)}</strong> ✓`;
    } else if (stockIni > 0 && !zonaIni) {
      msg += '<br><span style="color:var(--warn)">Se cargó cantidad pero no depósito — no se registró ingreso inicial.</span>';
    }
    document.getElementById('prod-msg').innerHTML = `<div class="alert alert-ok">${msg}</div>`;
    await init();
    setTimeout(() => closeModal(), 1200);
  } catch (err) {
    document.getElementById('prod-msg').innerHTML = `<div class="alert alert-err">${attrEsc(err.message)}</div>`;
  }
}

async function submitFoto(sku) {
  try {
    const prod = STATE.productos.find(p => p.SKU === sku);
    const input = document.getElementById('f-foto');
    if (!input.files || input.files.length === 0) throw new Error('Elegí una foto');
    const file = input.files[0];
    document.getElementById('foto-msg').innerHTML = '<div class="alert alert-info">Subiendo... puede tardar unos segundos.</div>';
    const base64 = await fileToBase64(file);
    await apiPostJSON('uploadFoto', {
      sku, nombre: prod.Nombre, categoria: prod.Categoria || 'Varios',
      base64, mimeType: file.type || 'image/jpeg',
    });
    document.getElementById('foto-msg').innerHTML = `<div class="alert alert-ok">Foto guardada ✓</div>`;
    await init();
    setTimeout(() => closeModal(), 800);
  } catch (err) {
    document.getElementById('foto-msg').innerHTML = `<div class="alert alert-err">${attrEsc(err.message)}</div>`;
  }
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => {
      const s = reader.result;
      const idx = s.indexOf('base64,');
      res(idx >= 0 ? s.substring(idx + 7) : s);
    };
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

          <div class="info">
            <strong>${attrEsc(r.Nombre || r.SKU)}</strong>
            <small>${attrEsc(r.SKU)} · ${attrEsc(r.Categoria || '')}</small>

          <div style="font-weight:700;color:var(--primary);">${r[codigo]} <small style="color:var(--muted);font-weight:400;">${attrEsc(r.Unidad||'')}</small></div>
        </div>`).join('')

  openModal(`
    <h2>${attrEsc(z.Nombre)}</h2>
    <div class="sub" style="color:var(--muted);margin-bottom:8px;">${attrEsc(z.Codigo)}${z.Descripcion ? ' · ' + attrEsc(z.Descripcion) : ''}</div>

}

function renderObrasView() {
  const list = document.getElementById('obras-list');
  if (!list) return;
  if (!STATE.obras.length) { list.innerHTML = '<div class="empty">Sin obras</div>'; return; }
  const activas = STATE.obras.filter(o => o.Estado !== 'Finalizada');
  const finalizadas = STATE.obras.filter(o => o.Estado === 'Finalizada');
  const render = (arr, label) => arr.length ? `
    <h4 style="color:var(--muted);margin:14px 0 8px;font-size:13px;text-transform:uppercase;">${label}</h4>
    ${arr.map(o => {
      const ubic = o.Ubicacion || '';
      const aut  = o.Autorizante || '';
      const res  = o.Responsable_Obra || o['Responsable Obra'] || o.Responsable || '';
      const meta = [];
      if (o.Direccion) meta.push(attrEsc(o.Direccion));
      if (aut)         meta.push('Autoriza: ' + attrEsc(aut));
      if (res)         meta.push('Resp: '     + attrEsc(res));
      return `
        <div class="list-item" onclick='showConsumoObra(${jsStr(o.Codigo)})'>
          <div class="info">
            <strong>${attrEsc(o.Nombre)}</strong>
            <small>${attrEsc(o.Codigo)}${meta.length ? ' · ' + meta.join(' · ') : ''}</small>
          </div>
          <div class="actions" onclick="event.stopPropagation();">
            ${ubic ? `<a href="${attrEsc(ubic)}" target="_blank">📍 Ubicación</a>` : ''}
          </div>
        </div>`;
    }).join('')}` : '';
  list.innerHTML = render(activas, 'Activas') + render(finalizadas, 'Finalizadas');
}

async function showConsumoObra(codigo) {
  const obra = STATE.obras.find(o => o.Codigo === codigo);
  openModal(`
    <h2>${attrEsc(obra ? obra.Nombre : codigo)}</h2>
    <div class="sub" style="color:var(--muted);margin-bottom:10px;">${attrEsc(codigo)}${obra && obra.Direccion ? ' · ' + attrEsc(obra.Direccion) : ''}</div>
    <div id="obra-content"><div class="loader">Cargando movimientos...</div></div>
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
    </div>
  `);
  try {
    const data = await api('getMovimientosObra', { obra: codigo });
    let html = '';
    if (data.reservas && data.reservas.length) {
      html += `<h3 style="color:var(--purple);font-size:15px;margin:10px 0 6px;">📌 Reservas vigentes</h3>`;
      html += data.reservas.map(r => `
        <div class="list-item">
          <div class="info"><strong>${attrEsc(r.nombre || r.sku)}</strong><small>${attrEsc(r.sku)}</small></div>
          <div style="font-weight:600;color:var(--purple)">${r.cantidad} ${attrEsc(r.unidad || '')}</div>
        </div>`).join('');
    }
    if (data.consumo && data.consumo.length) {
      html += `<h3 style="color:var(--orange);font-size:15px;margin:14px 0 6px;">📦 Consumo (egresos acumulados)</h3>`;
      html += data.consumo.map(c => `
        <div class="list-item">
          <div class="info"><strong>${attrEsc(c.nombre || c.sku)}</strong><small>${attrEsc(c.sku)}</small></div>
          <div style="font-weight:600;color:var(--orange)">${c.cantidad} ${attrEsc(c.unidad || '')}</div>
        </div>`).join('');
    }
    if (data.movimientos && data.movimientos.length) {
      html += `<h3 style="color:var(--primary);font-size:15px;margin:14px 0 6px;">📋 Histórico (${data.movimientos.length})</h3>`;
      html += `<div style="max-height:400px;overflow-y:auto;">`;
      html += data.movimientos.map(m => {
        const fecha = m.Fecha ? new Date(m.Fecha).toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'2-digit'}) : '';
        const prod = STATE.productos.find(p => p.SKU === m.SKU);
        return `
          <div class="mov-row">
            <span class="tipo ${attrEsc(m.Tipo)}">${attrEsc(m.Tipo)}</span>
            <div>
              <div><strong>${attrEsc(prod ? prod.Nombre : m.SKU)}</strong></div>
              <small style="color:var(--muted);">${fecha}${m.Usuario ? ' · ' + attrEsc(m.Usuario) : ''}${m.Notas ? ' · ' + attrEsc(m.Notas) : ''}</small>
            </div>
            <div style="text-align:right;font-weight:600;">${m.Cantidad}</div>
          </div>`;
      }).join('');
      html += `</div>`;
    }
    if (!html) html = '<div class="empty">Sin movimientos para esta obra todavía.</div>';
    document.getElementById('obra-content').innerHTML = html;
  } catch (err) {
    document.getElementById('obra-content').innerHTML = `<div class="alert alert-err">${attrEsc(err.message)}</div>`;
  }
}

// ============== MAPAS (Leaflet + OpenStreetMap) ==============

// Parsea un link de Google Maps y devuelve { lat, lng } o null.
// Maneja los formatos comunes:
//   - .../@-34.5,-58.4,15z  (formato principal cuando compartís un lugar)
//   - ?q=-34.5,-58.4
//   - !3d-34.5!4d-58.4  (formato embed)
// Los links cortos (maps.app.goo.gl, goo.gl/maps) no se pueden resolver del lado del cliente.
function parseLatLng(url) {
  if (!url) return null;
  const s = String(url);
  let m = s.match(/@(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  m = s.match(/[?&]q=(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  m = s.match(/!3d(-?\d+(?:\.\d+)?)!4d(-?\d+(?:\.\d+)?)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  return null;
}

// Estado interno de mapas (para poder destruirlos al cerrar modal)
let _mapInstance = null;

function _destroyMap() {
  if (_mapInstance) { try { _mapInstance.remove(); } catch(e){} _mapInstance = null; }
}

function _renderMapModal(titulo, items, color) {
  // items: [{ nombre, subtitulo, url, ubicacionUrl }]
  const parsed = items.map(it => {
    const ll = parseLatLng(it.ubicacionUrl);
    return { ...it, ll };
  });
  const ok  = parsed.filter(p => p.ll);
  const bad = parsed.filter(p => !p.ll);

  openModal(`
    <h2>${attrEsc(titulo)}</h2>
    <div style="color:var(--muted);font-size:13px;margin-bottom:8px;">
      ${ok.length} en el mapa${bad.length ? ` · ${bad.length} sin ubicación válida` : ''}
    </div>
    <div id="mapa" style="height:60vh;min-height:360px;border-radius:10px;overflow:hidden;border:1px solid var(--border);"></div>
    ${bad.length ? `
      <details style="margin-top:10px;">
        <summary style="cursor:pointer;color:var(--muted);font-size:13px;">Sin ubicación (${bad.length})</summary>
        <div style="font-size:12px;color:var(--muted);margin-top:6px;">
          ${bad.map(b => `• ${attrEsc(b.nombre)}${b.ubicacionUrl ? ' (link corto, no se pudo parsear)' : ' (sin link)'}`).join('<br>')}
        </div>
        <div class="hint" style="margin-top:6px;">
          Tip: si el link es de <code>maps.app.goo.gl</code> o <code>goo.gl/maps</code>, abrilo en el navegador, esperá que redirija, y copiá la URL larga que tiene las coordenadas.
        </div>
      </details>
    ` : ''}
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn btn-secondary" onclick="closeModal(); _destroyMap();">Cerrar</button>
    </div>
  `);

  // Inicializar Leaflet después de que el div esté en el DOM
  setTimeout(() => {
    _destroyMap();
    if (typeof L === 'undefined') {
      document.getElementById('mapa').innerHTML =
        '<div class="alert alert-err" style="margin:10px;">No se pudo cargar Leaflet. Revisá que tengas internet.</div>';
      return;
    }
    const map = L.map('mapa');
    _mapInstance = map;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a>'
    }).addTo(map);

    if (!ok.length) {
      // Vista por defecto: Argentina
      map.setView([-38.4, -63.6], 4);
      return;
    }

    const markers = ok.map(p => {
      const icon = L.divIcon({
        html: `<div style="background:${color};color:#fff;width:28px;height:28px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);"><span style="transform:rotate(45deg);font-weight:700;font-size:11px;">${attrEsc((p.nombre||'').charAt(0).toUpperCase())}</span></div>`,
        className: '',
        iconSize: [28, 28],
        iconAnchor: [14, 28],
        popupAnchor: [0, -26],
      });
      const mk = L.marker([p.ll.lat, p.ll.lng], { icon }).addTo(map);
      const popHtml =
        `<div style="min-width:180px;">
          <div style="font-weight:700;margin-bottom:4px;">${attrEsc(p.nombre)}</div>
          ${p.subtitulo ? `<div style="font-size:12px;color:#555;margin-bottom:6px;">${attrEsc(p.subtitulo)}</div>` : ''}
          <a href="${attrEsc(p.ubicacionUrl)}" target="_blank" style="font-size:12px;">Abrir en Google Maps ↗</a>
        </div>`;
      mk.bindPopup(popHtml);
      return mk;
    });

    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.2));
    if (ok.length === 1) map.setZoom(15);
  }, 80);
}

// ============== MODAL / NAV ==============
function openModal(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  _destroyMap();
}
function showView(v) {
  ['stock','productos','zonas','obras'].forEach(x => {
    const el = document.getElementById('view-' + x);
    if (el) el.style.display = (v === x) ? '' : 'none';
  });
  document.getElementById('fab').style.display = (v === 'stock') ? '' : 'none';
  document.querySelectorAll('#nav-tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === v);
  });
}
