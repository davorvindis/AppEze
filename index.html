<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#143757">
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stock">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Stock · EQTC</title>
<!-- Google Maps -->
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAKJaDquxnEcr_Dkfvb-6DS-1B3R3zSwyA&callback=_gmapsReady"></script>
<script>let _gmapsLoaded=false; function _gmapsReady(){_gmapsLoaded=true;}</script>
<style>
  :root {
    --primary: #1F4E78;
    --primary-dark: #143757;
    --primary-deep: #0B1F35;
    --accent: #2E8B57;
    --accent-2: #3BA272;
    --warn: #C0392B;
    --warn-2: #FF6B6B;
    --orange: #D97706;
    --purple: #7C3AED;
    --bg: #F4F6F9;
    --card: #FFFFFF;
    --text: #222;
    --muted: #6B7280;
    --border: #E3E7ED;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; font-size:16px; overscroll-behavior-y:contain; -webkit-text-size-adjust:100%; text-size-adjust:100%; overflow-x:hidden; overscroll-behavior-x:none; width:100%; }
  /* Evita que cualquier elemento empuje el viewport horizontalmente */
  img, video, canvas, svg { max-width:100%; }

  /* ================= LOGIN ================= */
  #login-view {
    position:fixed; inset:0; z-index:300;
    background: radial-gradient(ellipse at top, #2A5F8F 0%, #143757 40%, #0B1F35 100%);
    display:none; flex-direction:column; align-items:center; justify-content:center;
    padding:30px 20px;
    padding-top:calc(30px + env(safe-area-inset-top));
    padding-bottom:calc(30px + env(safe-area-inset-bottom));
    overflow-y:auto;
  }
  #login-view.open { display:flex; }
  .login-logo { font-size:52px; margin-bottom:6px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3)); }
  .login-title { color:#fff; font-size:22px; font-weight:700; margin:0; letter-spacing:0.4px; }
  .login-sub { color:rgba(255,255,255,0.65); font-size:13px; margin:4px 0 26px; }

  /* Selección de usuario */
  .user-pick { display:grid; gap:10px; width:100%; max-width:340px; }
  .user-card {
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:14px; padding:14px 16px;
    display:flex; align-items:center; gap:14px;
    color:#fff; cursor:pointer;
    transition:transform .12s ease, background .15s ease;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .user-card:active { transform:scale(0.98); background:rgba(255,255,255,0.16); }
  .user-card .avatar-sm {
    width:44px; height:44px; border-radius:50%;
    background:linear-gradient(135deg, #3BA272, #1F4E78);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:18px;
    box-shadow:0 4px 10px rgba(0,0,0,0.25);
  }
  .user-card .t strong { display:block; font-size:16px; font-weight:600; }
  .user-card .t small  { color:rgba(255,255,255,0.65); font-size:12px; }
  .user-card .chev { margin-left:auto; color:rgba(255,255,255,0.5); font-size:20px; }

  /* PIN */
  .pin-screen { display:flex; flex-direction:column; align-items:center; width:100%; }
  .user-avatar-lg {
    width:82px; height:82px; border-radius:50%;
    background:linear-gradient(135deg, #3BA272, #1F4E78);
    color:#fff; display:flex; align-items:center; justify-content:center;
    font-size:32px; font-weight:700;
    margin:0 auto 14px;
    box-shadow:0 10px 28px rgba(0,0,0,0.35);
    border:3px solid rgba(255,255,255,0.18);
  }
  .user-name { color:#fff; font-size:18px; font-weight:600; margin-bottom:6px; letter-spacing:.2px; }
  .user-hint { color:rgba(255,255,255,0.55); font-size:13px; margin-bottom:22px; }
  .pin-dots { display:flex; gap:16px; margin-bottom:28px; justify-content:center; }
  .pin-dot {
    width:14px; height:14px; border-radius:50%;
    background:rgba(255,255,255,0.14);
    border:1.5px solid rgba(255,255,255,0.38);
    transition: all .18s cubic-bezier(.3,.6,.3,1);
  }
  .pin-dot.filled { background:#fff; border-color:#fff; transform:scale(1.18); box-shadow:0 0 12px rgba(255,255,255,0.55); }
  .pin-dot.error { background:var(--warn-2); border-color:var(--warn-2); box-shadow:0 0 12px rgba(255,107,107,0.55); }
  .pin-pad { display:grid; grid-template-columns:repeat(3, 72px); gap:16px; }
  .pin-key {
    width:72px; height:72px; border-radius:50%;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.13);
    color:#fff; font-size:28px; font-weight:500;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all .1s ease;
    user-select:none;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .pin-key:active { background:rgba(255,255,255,0.28); transform:scale(0.92); }
  .pin-key.spacer { visibility:hidden; pointer-events:none; background:transparent; border:none; }
  .pin-key.back   { font-size:22px; background:transparent; border:1px solid rgba(255,255,255,0.08); }
  .pin-err { color:var(--warn-2); font-size:13px; margin-top:16px; min-height:20px; text-align:center; font-weight:500; }
  .pin-switch {
    margin-top:28px; color:rgba(255,255,255,0.72);
    background:none; border:none; font-size:13px; cursor:pointer;
    padding:8px 16px; border-radius:8px;
  }
  .pin-switch:active { background:rgba(255,255,255,0.08); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
  .pin-shake { animation: shake .4s; }

  /* ================= APP (una vez logueado) ================= */
  header { position:sticky; top:0; z-index:10; background:var(--primary); color:#fff; padding:clamp(6px, 1.6vw, 10px) clamp(10px, 3vw, 16px); padding-top:calc(clamp(6px, 1.6vw, 10px) + env(safe-area-inset-top)); box-shadow:0 2px 8px rgba(0,0,0,.12); }
  header .top { display:flex; justify-content:space-between; align-items:center; gap:10px; }
  header h1 { margin:0; font-size:clamp(14px, 4vw, 17px); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; flex:1; }
  .user-chip {
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(255,255,255,0.13);
    border:1px solid rgba(255,255,255,0.18);
    border-radius:999px; padding:4px 10px 4px 5px;
    cursor:pointer; color:#fff; font-size:13px;
    transition:background .12s ease;
  }
  .user-chip:active { background:rgba(255,255,255,0.25); }
  .user-chip .avatar-xs {
    width:26px; height:26px; border-radius:50%;
    background:linear-gradient(135deg, #3BA272, #1F4E78);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:12px;
  }
  .user-chip .logout { font-size:15px; opacity:.8; padding-left:2px; }

  .nav-tabs { display:flex; gap:4px; overflow-x:auto; overflow-y:hidden; margin-top:8px; padding-bottom:2px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .nav-tabs::-webkit-scrollbar { display:none; }
  .nav-tabs button { flex-shrink:0; background:rgba(255,255,255,.15); border:none; color:#fff; padding:6px 12px; border-radius:6px; font-size:12.5px; cursor:pointer; min-height:32px; max-width:140px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .nav-tabs button.active { background:#fff; color:var(--primary); font-weight:600; }
  main { padding:10px; padding-left:calc(10px + env(safe-area-inset-left)); padding-right:calc(10px + env(safe-area-inset-right)); max-width:800px; margin:0 auto; padding-bottom:calc(96px + env(safe-area-inset-bottom)); }
  .tabs { display:flex; gap:6px; overflow-x:auto; overflow-y:hidden; padding:6px 0; margin-bottom:6px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex-shrink:0; padding:6px 12px; background:#fff; border:1px solid var(--border); border-radius:999px; font-size:13px; cursor:pointer; color:var(--muted); max-width:160px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }
  .search { display:flex; gap:8px; margin-bottom:10px; }
  .search input, .search select { flex:1; padding:10px; border:1px solid var(--border); border-radius:8px; background:#fff; font-size:14px; }
  .card { background:var(--card); border-radius:12px; padding:clamp(9px, 2.5vw, 12px); margin-bottom:8px; box-shadow:0 1px 3px rgba(0,0,0,.05); display:flex; gap:clamp(8px, 2.4vw, 12px); align-items:flex-start; cursor:pointer; overflow:hidden; }
  .card img { width:clamp(44px, 14vw, 64px); height:clamp(44px, 14vw, 64px); border-radius:8px; object-fit:cover; background:#eee; flex-shrink:0; }
  .card .info { flex:1; min-width:0; }
  .card .title { font-weight:600; font-size:clamp(13.5px, 3.8vw, 15.5px); margin-bottom:3px; line-height:1.25; overflow-wrap:anywhere; }
  .card .sub { color:var(--muted); font-size:clamp(11.5px, 3.3vw, 13px); margin-bottom:4px; overflow-wrap:anywhere; }
  .chips { display:flex; flex-wrap:wrap; gap:4px; }
  .chip { background:#EEF2F7; color:var(--primary); padding:2px 7px; border-radius:12px; font-size:11.5px; font-weight:500; white-space:nowrap; }
  .chip.warn { background:#FDE8E6; color:var(--warn); }
  .totals { display:flex; flex-direction:column; align-items:flex-end; gap:2px; flex-shrink:0; }
  .total-big { font-size:clamp(18px, 5.5vw, 24px); font-weight:700; color:var(--primary); line-height:1; }
  .unit { font-size:11px; color:var(--muted); white-space:nowrap; }
  .badge-warn { background:var(--warn); color:#fff; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
  /* Fondo que "apaga" los cards que pasan por debajo del FAB (no intercepta clicks) */
  .fab-scrim {
    position:fixed;
    left:0; right:0;
    bottom:0;
    height:calc(88px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, var(--bg) 48%, rgba(244,246,249,0));
    z-index:19;
    pointer-events:none;
  }
  /* FAB: padding-left/right en vez de left/right para respetar safe-area,
     y minmax(0,1fr) para que las columnas NUNCA crezcan más que su celda
     (sin esto un label largo + white-space:nowrap empuja columnas fuera
     de pantalla en celus con display zoom activado — bug de S25 Ultra). */
  .fab {
    position:fixed;
    left:0; right:0;
    bottom:env(safe-area-inset-bottom, 0);
    padding: 0 max(8px, env(safe-area-inset-right)) 8px max(8px, env(safe-area-inset-left));
    max-width:760px;
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:5px;
    z-index:20;
    pointer-events:none; /* el contenedor no intercepta clicks fuera de los botones */
  }
  .fab button {
    pointer-events:auto;
    min-width:0;
    width:100%;
    padding:6px 4px;
    border:none;
    border-radius:9px;
    font-size:clamp(10px, 2.8vw, 12px);
    font-weight:600;
    color:#fff;
    cursor:pointer;
    box-shadow:0 3px 10px rgba(0,0,0,.14);
    min-height:34px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    line-height:1.15;
  }
  .fab .b-in  { background:var(--accent); }
  .fab .b-tr  { background:var(--primary); }
  .fab .b-eg  { background:var(--orange); }
  .fab .b-re  { background:var(--purple); }
  .fab .b-li  { background:#475569; }
  .fab .b-aj  { background:#6B7280; }

  /* Modal */
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:flex-end; z-index:100; }
  .modal-bg.open { display:flex; }
  .modal { background:#fff; width:100%; max-width:600px; margin:0 auto; border-radius:16px 16px 0 0; padding:18px; padding-bottom:calc(18px + env(safe-area-inset-bottom)); max-height:92vh; overflow-y:auto; }

  /* Custom dialog (por encima del modal, para confirmaciones dentro de un modal) */
  .cd-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:9999; padding:20px; animation:cd-fade .12s ease-out; }
  .cd-box { background:#fff; width:100%; max-width:420px; border-radius:14px; padding:20px 20px 18px; box-shadow:0 20px 60px rgba(0,0,0,.35); }
  .cd-title { font-size:17px; font-weight:700; color:var(--primary); margin-bottom:8px; }
  .cd-msg { font-size:14px; color:#4B5563; line-height:1.5; margin-bottom:16px; }
  .cd-btns { display:flex; flex-direction:column; gap:8px; }
  .cd-btns .btn { width:100%; }
  @keyframes cd-fade { from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:translateY(0);} }
  .modal h2 { margin:0 0 12px; font-size:18px; color:var(--primary); }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:4px; font-weight:500; }
  .field input, .field select, .field textarea { width:100%; padding:12px; border:1px solid var(--border); border-radius:8px; font-size:15px; background:#fff; }
  .field textarea { min-height:60px; resize:vertical; }
  .field .row-with-btn { display:flex; gap:6px; }
  .field .row-with-btn select { flex:1; }
  .field .row-with-btn button { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:0 14px; font-weight:600; cursor:pointer; font-size:13px; }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .toggle-row { display:flex; align-items:center; gap:8px; background:#F4F6F9; padding:10px 12px; border-radius:8px; margin-bottom:8px; }
  .combo { position:relative; }
  .combo input[type="text"] { width:100%; box-sizing:border-box; }
  .combo-list { display:none; position:absolute; left:0; right:0; top:calc(100% + 4px); background:var(--card); border:1px solid var(--border); border-radius:8px; max-height:260px; overflow-y:auto; z-index:500; box-shadow:0 8px 20px rgba(0,0,0,.14); }
  .combo-list.open { display:block; }
  .combo-item { padding:10px 12px; cursor:pointer; font-size:14px; border-bottom:1px solid var(--border); }
  .combo-item:last-child { border-bottom:none; }
  .combo-item:hover, .combo-item:active { background:var(--bg); }
  .combo-empty { padding:12px; color:var(--muted); text-align:center; font-size:13px; }
  .combo-header { padding:6px 12px; font-size:11px; font-weight:600; color:var(--muted); background:var(--bg); text-transform:uppercase; letter-spacing:.04em; border-bottom:1px solid var(--border); position:sticky; top:0; }
  .combo-recent { background:color-mix(in srgb, var(--accent) 6%, transparent); }
  .combo-recent:hover { background:color-mix(in srgb, var(--accent) 12%, transparent); }
  .toggle-row input[type=checkbox] { width:18px; height:18px; }
  .toggle-row label { margin:0; font-size:14px; color:var(--text); flex:1; cursor:pointer; }
  .btn-row { display:flex; gap:8px; margin-top:8px; }
  .btn { flex:1; padding:14px; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; }
  .btn-primary { background:var(--primary); color:#fff; }
  .btn-secondary { background:#E3E7ED; color:var(--text); }
  .btn-accent { background:var(--accent); color:#fff; }
  .btn-warn { background:var(--warn); color:#fff; }
  .btn-purple { background:var(--purple); color:#fff; }
  .btn-orange { background:var(--orange); color:#fff; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .alert { padding:10px 12px; border-radius:8px; margin-bottom:10px; font-size:14px; }
  .alert-err { background:#FDE8E6; color:var(--warn); border:1px solid #F5B7B1; }
  .alert-ok  { background:#D5F5E3; color:#1E8449; border:1px solid #ABEBC6; }
  .alert-info { background:#D6EAF8; color:#1B4F72; border:1px solid #AED6F1; }
  .empty { text-align:center; color:var(--muted); padding:40px 20px; }
  .loader { text-align:center; padding:30px; color:var(--muted); }
  .detail-rows .row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:14px; }
  .list-item { background:#fff; border-radius:10px; padding:12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .list-item .info { flex:1; min-width:0; }
  .list-item .info strong { display:block; font-size:15px; margin-bottom:2px; }
  .list-item .info small { color:var(--muted); font-size:12px; }
  .list-item .actions a { text-decoration:none; color:var(--primary); font-weight:600; font-size:13px; padding:8px 12px; border:1px solid var(--primary); border-radius:6px; display:inline-block; }
  .mov-row { display:grid; grid-template-columns:60px 1fr auto; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); font-size:14px; align-items:center; }
  .mov-row .tipo { padding:3px 7px; border-radius:4px; font-size:11px; font-weight:600; color:#fff; text-align:center; }
  .mov-row .tipo.Ingreso { background:var(--accent); }
  .mov-row .tipo.Traslado { background:var(--primary); }
  .mov-row .tipo.Egreso { background:var(--orange); }
  .mov-row .tipo.Ajuste { background:#6B7280; }
  .mov-row .tipo.Reserva { background:var(--purple); }
  .mov-row .tipo.Libera_Reserva { background:#9B59B6; }
  .foto-preview { width:100%; max-height:200px; object-fit:cover; border-radius:8px; margin:8px 0; }
  .qr-preview { display:block; margin:10px auto; max-width:200px; border:1px solid var(--border); border-radius:8px; padding:6px; }
  .hint { font-size:12px; color:var(--muted); margin-top:4px; }
  .hint-strong { background:#FFF3CD; color:#7D5A00; padding:8px 10px; border-radius:6px; font-size:13px; margin-top:6px; }

  .basket-line { background:#F4F6F9; border:1px solid var(--border); border-radius:10px; padding:10px; margin-bottom:8px; position:relative; }
  .basket-line .del-x { position:absolute; top:6px; right:8px; background:none; border:none; color:var(--warn); font-size:18px; cursor:pointer; padding:4px; }
  .basket-line .head { font-weight:600; padding-right:24px; margin-bottom:6px; }
  .basket-line small { color:var(--muted); }
  .add-line-btn { background:#E3E7ED; color:var(--text); border:1px dashed var(--muted); border-radius:10px; padding:10px; width:100%; font-weight:600; cursor:pointer; margin-bottom:8px; }

  /* Loader / skeleton */
  .loader { text-align:center; padding:30px; color:var(--muted); }
  .loader-spinner { display:inline-block; width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .7s linear infinite; margin-bottom:8px; }
  .skeleton { display:flex; gap:12px; align-items:flex-start; padding:12px; margin-bottom:10px; background:var(--card); border-radius:12px; }
  .skeleton .sk-img { width:64px; height:64px; border-radius:8px; background:linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%); background-size:200% 100%; animation:shimmer 1.4s ease infinite; flex-shrink:0; }
  .skeleton .sk-lines { flex:1; display:flex; flex-direction:column; gap:8px; padding-top:4px; }
  .skeleton .sk-line { height:12px; border-radius:6px; background:linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%); background-size:200% 100%; animation:shimmer 1.4s ease infinite; }
  .skeleton .sk-line.short { width:60%; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* App oculto hasta login */
  .app-hidden { display:none !important; }

  /* ================= TOASTS ================= */
  /* Contenedor fijo arriba, no bloquea clicks */
  .toast-layer {
    position:fixed;
    top:calc(8px + env(safe-area-inset-top));
    left:8px; right:8px;
    max-width:560px; margin:0 auto;
    z-index:200;
    display:flex; flex-direction:column; gap:8px;
    pointer-events:none;
  }
  .toast {
    pointer-events:auto;
    background:#fff; color:var(--text);
    border-left:4px solid var(--primary);
    border-radius:10px;
    padding:12px 14px;
    box-shadow:0 8px 24px rgba(0,0,0,.18), 0 2px 6px rgba(0,0,0,.08);
    display:flex; align-items:flex-start; gap:10px;
    font-size:14px;
    animation: toast-in .22s cubic-bezier(.2,.9,.3,1.2);
    position:relative;
    overflow:hidden;
  }
  .toast.toast-ok   { border-left-color:var(--accent); }
  .toast.toast-err  { border-left-color:var(--warn); }
  .toast.toast-info { border-left-color:var(--primary); }
  .toast .toast-icon {

  .toast .toast-body .toast-title { font-weight:600; }

  @keyframes toast-in  { from { transform:translateY(-12px); opacity:0 } to { transform:translateY(0); opacity:1 } }

<script>
// ============== CONFIGURACIÓN HARDCODEADA ==============
const API_URL   = 'https://script.google.com/macros/s/AKfycbwJGWoCi3004QpbwVdM_4EGp-K64ZcQhuzHUhdQ9KypaEEGcOyHVmesmU-xh8M_vrw/exec';
const API_TOKEN = 'el_inventario_123_de_Eze';
// =======================================================

// SVG "sin foto" — pre-codificado para que el onerror funcione sin escapes raros.
const NO_FOTO = 'data:image/svg+xml;utf8,' + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64"><rect width="64" height="64" fill="#E3E7ED"/><text x="32" y="38" text-anchor="middle" font-size="28" fill="#6B7280">&#128230;</text></svg>'
);
window.NO_FOTO = NO_FOTO;

// Helpers de escape
function attrEsc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;')
    .replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function jsStr(s) {
  // JSON.stringify produce comillas dobles JS-válidas. attrEsc convierte " → &quot;
  // para que sobreviva dentro de onclick='...' sin cerrar el atributo.
  return attrEsc(JSON.stringify(String(s == null ? '' : s)));
}
function initialsOf(name) {
  const t = (name || '?').trim();
  if (!t) return '?';
  const parts = t.split(/\s+/).filter(Boolean);
  return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
}

// Diálogo modal simple con título, mensaje y 1-3 botones. Devuelve una
// Promise que resuelve con la "key" del botón elegido (o null si se hace
// click fuera / ESC). Útil para confirmaciones con más de dos opciones
// (window.confirm sólo permite OK/Cancel).
// Uso:
//   const r = await customDialog({
//     title: '¿Qué hago?',
//     message: 'Explicación breve…',
//     buttons: [
//       { key: 'add',  label: '+ Agregar depósito', kind: 'primary' },
//       { key: 'skip', label: 'Continuar sin stock', kind: 'secondary' },
//     ],
//   });
function customDialog({ title, message, buttons, dismissable = true }) {
  return new Promise(resolve => {
    let done = false;
    const finish = (key) => {
      if (done) return; done = true;
      document.removeEventListener('keydown', onKey);
      overlay.remove();
      resolve(key);
    };
    const onKey = (e) => { if (e.key === 'Escape' && dismissable) finish(null); };

    const overlay = document.createElement('div');
    overlay.className = 'cd-overlay';
    overlay.innerHTML = `
      <div class="cd-box" role="dialog" aria-modal="true">
        ${title ? `<div class="cd-title">${attrEsc(title)}</div>` : ''}
        ${message ? `<div class="cd-msg">${message}</div>` : ''}
        <div class="cd-btns"></div>
      </div>`;
    const btnsWrap = overlay.querySelector('.cd-btns');
    (buttons || [{ key: 'ok', label: 'OK', kind: 'primary' }]).forEach(b => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn btn-' + (b.kind || 'primary');
      btn.textContent = b.label;
      btn.addEventListener('click', () => finish(b.key));
      btnsWrap.appendChild(btn);
    });
    if (dismissable) {
      overlay.addEventListener('click', (e) => { if (e.target === overlay) finish(null); });
    }
    document.addEventListener('keydown', onKey);
    document.body.appendChild(overlay);
    // Focus al primer boton para que Enter lo dispare
    setTimeout(() => { const b = btnsWrap.querySelector('button'); if (b) b.focus(); }, 20);
  });
}

// Convierte URLs viejas de Drive (formato uc?export=view&id=X, que Google
// restringió en 2023+ y devuelve 403 al incrustar como <img>) al formato
// /thumbnail?id=X&sz=w1000, que sigue funcionando. Las URLs que no son
// de drive.google.com/uc, o las vacías, se devuelven tal cual.
// Así evitamos migrar las filas viejas del Sheet — parche del lado cliente.
function normalizeDriveURL(url) {
  if (!url) return '';
  const s = String(url);
  if (!/drive\.google\.com\/uc\b/.test(s)) return s;
  const m = s.match(/[?&]id=([A-Za-z0-9_-]+)/);
  if (!m) return s;
  return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w1000`;
}

// ============== ESTADO ==============
let STATE = {
  productos: [], zonas: [], obras: [], categorias: [], stock: [],
  reservasDetalle: [],  // [{SKU, Zona, Obra, Cantidad}] — solo > 0 (vigentes)
  currentZone: 'TODAS',
  egresoBasket: [],
  reservaBasket: [],  // [{sku, zona, cantidad}]
  liberaBasket: [],   // [{sku, zona, obra, cantidad}]
  // Últimos usados (sólo en esta sesión) — máx 3 c/u, más reciente primero
  recientes: { skus: [], obras: [], zonas: [] },
};
let USUARIOS_LIST = [];  // cache de getUsuarios
let SESSION = null;      // { user, nombre }
let PIN_BUF = '';
let SEL_USER = null;     // usuario seleccionado en el login pre-PIN

// ============== TOASTS / HAPTIC / UNDO ==============
// Toast flotante arriba. Opciones:
//   { type: 'ok' | 'err' | 'info', duration: ms, undo: asyncFn, undoLabel: str, sub: str }
// Si hay `undo`, la duración default es 5000ms y aparece el botón "Deshacer".
// Si falta `duration` y no hay undo, default 3000ms.
let _toastSeq = 0;
function toast(message, opts) {
  opts = opts || {};
  const type = opts.type || 'info';
  const hasUndo = typeof opts.undo === 'function';
  const duration = opts.duration || (hasUndo ? 5000 : 3000);
  const layer = document.getElementById('toast-layer');
  if (!layer) return;

  const id = 'toast-' + (++_toastSeq);
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.id = id;

  const icon = type === 'ok' ? '✓' : type === 'err' ? '!' : 'i';
  el.innerHTML = `
    <span class="toast-icon">${icon}</span>
    <div class="toast-body">
      <div class="toast-title"></div>
      ${opts.sub ? '<div class="toast-sub"></div>' : ''}
    </div>
    ${hasUndo ? `<button class="toast-undo" type="button">${attrEsc(opts.undoLabel || 'Deshacer')}</button>` : ''}
    <button class="toast-x" type="button" aria-label="Cerrar">×</button>
    <div class="toast-progress" style="animation-duration:${duration}ms;"></div>
  `;
  el.querySelector('.toast-title').textContent = message;
  if (opts.sub) el.querySelector('.toast-sub').textContent = opts.sub;

  const removeEl = () => {
    if (!el.parentNode) return;
    el.classList.add('closing');
    setTimeout(() => el.remove(), 200);
  };

  // Timer de auto-cierre (pausa si se hovea)
  let timer = setTimeout(removeEl, duration);
  el.addEventListener('mouseenter', () => { clearTimeout(timer); el.querySelector('.toast-progress').style.animationPlayState = 'paused'; });
  el.addEventListener('mouseleave', () => { timer = setTimeout(removeEl, 1500); el.querySelector('.toast-progress').style.animationPlayState = 'running'; });

  // Cerrar
  el.querySelector('.toast-x').addEventListener('click', () => { clearTimeout(timer); removeEl(); });

  // Undo
  if (hasUndo) {
    const btn = el.querySelector('.toast-undo');
    btn.addEventListener('click', async () => {
      btn.disabled = true; btn.textContent = '...';
      clearTimeout(timer);
      try {
        await opts.undo();
        btn.textContent = 'Hecho ✓';
        haptic('ok');
        setTimeout(removeEl, 900);
      } catch (err) {
        btn.disabled = false; btn.textContent = 'Reintentar';
        toast('No se pudo deshacer: ' + (err.message || err), { type: 'err' });
        haptic('err');
      }
    });
  }

  layer.appendChild(el);
  return { id, close: removeEl };
}

// Vibración háptica (silenciosa si el device no lo soporta o el user la desactivó)
function haptic(kind) {
  if (!navigator.vibrate) return;
  try {
    if (kind === 'ok')       navigator.vibrate(30);
    else if (kind === 'err') navigator.vibrate([50, 50, 50]);
    else if (kind === 'tap') navigator.vibrate(10);
    else                     navigator.vibrate(kind); // array custom
  } catch (_) {}
}

// Empuja valores al tope de recientes (más nuevo primero, sin duplicados, máx 3).
function pushReciente(bucket, value) {
  if (!value) return;
  const arr = STATE.recientes[bucket];
  if (!arr) return;
  const idx = arr.indexOf(value);
  if (idx !== -1) arr.splice(idx, 1);
  arr.unshift(value);
  if (arr.length > 3) arr.length = 3;
}

// Genera <option>s de zonas con los últimos usados arriba (en optgroup separador).
// No agrega placeholder "-- elegir --" (eso lo pone cada caller).
function buildZonaOptions() {
  const all = STATE.zonas || [];
  const recents = (STATE.recientes && STATE.recientes.zonas) || [];
  const recentCodes = new Set(recents.filter(c => all.some(z => z.Codigo === c)));
  let html = '';
  if (recentCodes.size > 0) {
    html += '<optgroup label="Últimos usados">';
    for (const c of recents) {
      const z = all.find(zz => zz.Codigo === c);
      if (z) html += `<option value="${attrEsc(z.Codigo)}">★ ${attrEsc(z.Nombre)}</option>`;
    }
    html += '</optgroup><optgroup label="Todos los galpones">';
  }
  html += all.map(z => `<option value="${attrEsc(z.Codigo)}">${attrEsc(z.Nombre)}</option>`).join('');
  if (recentCodes.size > 0) html += '</optgroup>';
  return html;
}

// Genera <option>s de obras con los últimos usados arriba. Por default filtra finalizadas.
function buildObraOptions(opts) {
  opts = opts || {};
  const onlyActive = opts.onlyActive !== false; // default true
  const base = (STATE.obras || []).filter(o => onlyActive ? o.Estado !== 'Finalizada' : true);
  const recents = (STATE.recientes && STATE.recientes.obras) || [];
  const recentCodes = new Set(recents.filter(c => base.some(o => o.Codigo === c)));
  let html = '';
  if (recentCodes.size > 0) {
    html += '<optgroup label="Últimas usadas">';
    for (const c of recents) {
      const o = base.find(oo => oo.Codigo === c);
      if (o) html += `<option value="${attrEsc(o.Codigo)}">★ ${attrEsc(o.Codigo)} — ${attrEsc(o.Nombre)}</option>`;
    }
    html += '</optgroup><optgroup label="Todas las obras">';
  }
  html += base.map(o => `<option value="${attrEsc(o.Codigo)}">${attrEsc(o.Codigo)} — ${attrEsc(o.Nombre)}</option>`).join('');
  if (recentCodes.size > 0) html += '</optgroup>';
  return html;
}

// Construye el movimiento inverso. Devuelve null si no se puede anular cleanly.
// Convención del CLAUDE.md: anular = emitir movimiento inverso, nunca borrar.
function inverseMovimiento(mov) {
  if (!mov || !mov.tipo) return null;
  const base = {
    sku: mov.sku,
    cantidad: mov.cantidad,
    usuario: SESSION ? SESSION.user : '',
    notas: 'Undo automático' + (mov.notas ? ' · ' + mov.notas : ''),
  };
  switch (mov.tipo) {
    case 'Reserva':        return { ...base, tipo: 'Libera_Reserva', zonaOrigen: mov.zonaOrigen, obra: mov.obra };
    case 'Libera_Reserva': return { ...base, tipo: 'Reserva',        zonaOrigen: mov.zonaOrigen, obra: mov.obra };
    case 'Traslado':       return { ...base, tipo: 'Traslado',       zonaOrigen: mov.zonaDestino, zonaDestino: mov.zonaOrigen };
    case 'Egreso':         return { ...base, tipo: 'Ingreso',        zonaDestino: mov.zonaOrigen, notas: base.notas + ' (reingreso por anulación)' };
    case 'Ingreso':        return { ...base, tipo: 'Ajuste',         zonaOrigen: mov.zonaDestino, motivo: 'Anulación de ingreso', cantidad: -Math.abs(mov.cantidad) };
    case 'Ajuste':         return { ...base, tipo: 'Ajuste',         zonaOrigen: mov.zonaOrigen,  motivo: 'Anulación de ajuste',  cantidad: -Number(mov.cantidad) };
    default:               return null;
  }
}

// Dispara el movimiento inverso vía API y refresca datos.
async function anularMovimiento(mov) {
  const inv = inverseMovimiento(mov);
  if (!inv) throw new Error('Este tipo de movimiento no se puede deshacer automáticamente');
  await api('addMovimiento', inv);
  await init();
}

// Anula un lote de movimientos en orden inverso (último primero, para respetar la cadena).
async function undoBatch(movs) {
  if (!Array.isArray(movs) || movs.length === 0) return;
  for (let i = movs.length - 1; i >= 0; i--) {
    const inv = inverseMovimiento(movs[i]);
    if (!inv) throw new Error('Este lote contiene un movimiento no reversible');
    await api('addMovimiento', inv);
  }
  await init();
}

// ============== SESIÓN ==============
function loadSession() {
  try {
    const raw = sessionStorage.getItem('stock_session');
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (s && s.user && s.nombre) return s;
  } catch (_) {}
  return null;
}
function saveSession(s) { sessionStorage.setItem('stock_session', JSON.stringify(s)); }
function clearSession() { sessionStorage.removeItem('stock_session'); }

// ============== API ==============
// ---- Saving overlay (blur + spinner) ----
function _ensureSaving() {
  if (document.getElementById('saving-overlay')) return;
  const css = document.createElement('style');
  css.textContent = `
    .saving-overlay{position:fixed;inset:0;background:rgba(11,31,53,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:99999}
    .saving-overlay.show{display:flex}
    .saving-box{background:#fff;padding:22px 28px;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.35);display:flex;align-items:center;gap:14px;font-weight:700;color:var(--primary);font-size:16px}
    .saving-spin{width:22px;height:22px;border:3px solid #E3E7ED;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .dots::after{content:'';animation:dots 1.2s steps(4,end) infinite}
    @keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
  `;
  document.head.appendChild(css);

  el.innerHTML = '<div class="saving-box"><div class="saving-spin"></div><span id="saving-msg">Guardando...</span></div>';
  document.body.appendChild(el);
}
function showSaving(msg){_ensureSaving();const el=document.getElementById('saving-msg');const txt=msg||'Guardando';el.innerHTML='<span>'+attrEsc(txt)+'</span><span class="dots"></span>';document.getElementById('saving-overlay').classList.add('show');}
function hideSaving(){const el=document.getElementById('saving-overlay');if(el)el.classList.remove('show');}

// Actions que son de escritura (muestran overlay)
const _WRITE_ACTIONS = ['addMovimiento','addProducto','addObra','addZona','uploadFoto','generarQR','sincronizarFotos','login'];

async function api(action, extra = {}, method = 'GET') {
  const isWrite = _WRITE_ACTIONS.indexOf(action) !== -1;
  if (isWrite) showSaving(action === 'login' ? 'Conectando' : action === 'uploadFoto' ? 'Subiendo foto' : action === 'generarQR' ? 'Generando QR' : 'Guardando');
  try {
    if (method === 'POST') {
      const body = JSON.stringify({ action, token: API_TOKEN, ...extra });
      const res = await fetch(API_URL, { method:'POST', headers:{ 'Content-Type':'text/plain;charset=utf-8' }, body });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      return data.data;
    } else {
      const params = new URLSearchParams({ action, token: API_TOKEN, ...extra });
      const res = await fetch(API_URL + '?' + params.toString(), { method: 'GET' });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      return data.data;
    }
  } finally {
    if (isWrite) hideSaving();
  }
}
async function apiPostJSON(action, extra = {}) {
  // IMPORTANTE: usamos text/plain (no application/json) para evitar el
  // preflight CORS OPTIONS. Apps Script no responde OPTIONS y lo rechaza.
  // El backend parsea el JSON del body igual, mirando postData.contents.
  const isWrite = _WRITE_ACTIONS.indexOf(action) !== -1;
  if (isWrite) showSaving(action === 'login' ? 'Conectando' : action === 'uploadFoto' ? 'Subiendo foto' : action === 'generarQR' ? 'Generando QR' : 'Guardando');
  try {
    const body = JSON.stringify({ action, token: API_TOKEN, ...extra });
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body, redirect: 'follow',
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    return data.data;
  } finally {
    if (isWrite) hideSaving();
  }
}

async function bootLogin() {
  document.getElementById('login-view').classList.add('open');
  document.getElementById('app-root').classList.add('app-hidden');
  const sub = document.getElementById('login-sub');
  sub.textContent = 'Cargando usuarios...';
  try {
    USUARIOS_LIST = await api('getUsuarios');
  } catch (err) {
    sub.innerHTML = '<span style="color:#FF9B9B">No pude conectar con el servidor:<br>' + attrEsc(err.message) + '</span>';
    return;
  }
  if (!USUARIOS_LIST.length) {
    sub.innerHTML = '<span style="color:#FF9B9B">No hay usuarios cargados en el Apps Script.</span>';
    return;
  }
  // Si hay un solo usuario, saltamos directo al PIN
  if (USUARIOS_LIST.length === 1) {
    selectUser(USUARIOS_LIST[0]);
    return;
  }
  showUserPicker();
}

function showUserPicker() {
  document.getElementById('login-sub').textContent = 'Elegí tu usuario';
  document.getElementById('login-users').style.display = '';
  document.getElementById('login-pin').style.display = 'none';
  document.getElementById('login-users').innerHTML = USUARIOS_LIST.map(u => `
    <div class="user-card" onclick='selectUser(${jsStr(JSON.stringify(u))})'>
      <div class="avatar-sm">${attrEsc(initialsOf(u.nombre))}</div>
      <div class="t"><strong>${attrEsc(u.nombre)}</strong><small>${attrEsc(u.user)}</small></div>
      <div class="chev">›</div>
    </div>
  `).join('');
}

function selectUser(u) {
  if (typeof u === 'string') u = JSON.parse(u);
  SEL_USER = u;
  PIN_BUF = '';
  document.getElementById('login-sub').textContent = '';
  document.getElementById('login-users').style.display = 'none';
  document.getElementById('login-pin').style.display = 'flex';
  document.getElementById('pin-avatar').textContent = initialsOf(u.nombre);
  document.getElementById('pin-name').textContent = u.nombre;
  document.getElementById('pin-err').textContent = '';
  renderPinDots();
}

function renderPinDots(errorFlash) {
  const dots = document.querySelectorAll('#pin-dots .pin-dot');
  dots.forEach((d, i) => {
    d.className = 'pin-dot'
      + (i < PIN_BUF.length ? ' filled' : '')
      + (errorFlash ? ' error' : '');
  });
}

function pinDigit(d) {
  if (!SEL_USER) return;
  if (PIN_BUF.length >= 4) return;
  PIN_BUF += d;
  renderPinDots();
  if (PIN_BUF.length === 4) tryLogin();
}
function pinBack() {
  PIN_BUF = PIN_BUF.slice(0, -1);
  renderPinDots();
  document.getElementById('pin-err').textContent = '';
}

async function tryLogin() {
  const errEl = document.getElementById('pin-err');
  errEl.textContent = '';
  try {
    const res = await api('login', { user: SEL_USER.user, pin: PIN_BUF });
    SESSION = { user: res.user, nombre: res.nombre };
    saveSession(SESSION);
    PIN_BUF = '';
    enterApp();
  } catch (err) {
    errEl.textContent = err.message || 'PIN incorrecto';
    renderPinDots(true);
    const pad = document.getElementById('login-pin');
    pad.classList.add('pin-shake');
    setTimeout(() => { pad.classList.remove('pin-shake'); PIN_BUF = ''; renderPinDots(); }, 420);
  }
}

// soporte de teclado físico (PC / tablet con teclado)
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('login-view').classList.contains('open')) return;
  if (!SEL_USER) return;
  if (/^[0-9]$/.test(e.key)) { pinDigit(e.key); e.preventDefault(); }
  else if (e.key === 'Backspace') { pinBack(); e.preventDefault(); }
});

async function init() {
  showSkeletons();
  try {
    const [productos, zonas, obras, categorias, stock, reservasDetalle] = await Promise.all([
      api('getProducts'),
      api('getZones'),
      api('getObras'),
      api('getCategorias'),
      api('getStock'),
      api('getReservasDetalle').catch(() => []),  // si el backend viejo no lo tiene, no rompe
    ]);
    // Normalizo SKU/Codigo a String — el backend devuelve Number si son todos
    // dígitos (ej: SKU de 13 dígitos tipo EAN), y las comparaciones con ===
    // fallan silenciosamente. Tramitamos una sola vez acá.
    const toStr = v => (v == null ? '' : String(v));
    STATE.productos     = (productos || []).map(p => ({
      ...p,
      SKU: toStr(p.SKU),
      Foto_URL: normalizeDriveURL(p.Foto_URL),
      QR_URL:   normalizeDriveURL(p.QR_URL),
    }));
    STATE.zonas         = (zonas || []).map(z => ({ ...z, Codigo: toStr(z.Codigo) }));
    STATE.obras         = (obras || []).map(o => ({ ...o, Codigo: toStr(o.Codigo) }));
    STATE.categorias    = categorias || [];
    STATE.stock         = (stock || []).map(s => ({ ...s, SKU: toStr(s.SKU) }));
    STATE.reservasDetalle = (reservasDetalle || []).map(r => ({
      ...r, SKU: toStr(r.SKU), Zona: toStr(r.Zona), Obra: toStr(r.Obra),
    }));
    renderZonas();
    renderCategorias();
    renderStock();
    renderProductos();
    renderZonasView();
    renderObrasView();
    return true;
  } catch (err) {
    document.getElementById('stock-list').innerHTML = `<div class="alert alert-err">${attrEsc(err.message)}</div>`;
    return false;
  }
}

// ============== HELPERS STOCK ==============
function getStockRow(sku) { return STATE.stock.find(x => x.SKU === sku); }
function getStockEnZona(sku, zona) { const r = getStockRow(sku); return r ? Number(r[zona] || 0) : 0; }
function getZonasConStock(sku) {
  const r = getStockRow(sku);
  if (!r) return [];
  return STATE.zonas.filter(z => Number(r[z.Codigo] || 0) > 0);
}
function productosConStock() {
  return STATE.productos.filter(p => {
    const r = getStockRow(p.SKU);
    return r && Number(r.Disponible || 0) > 0;
  });
}
function productosConReserva() {
  // Preferimos el detalle de reservas (vigentes) para evitar mostrar
  // productos que quedaron con "Reservado" desfasado en Stock_Actual.
  if (STATE.reservasDetalle && STATE.reservasDetalle.length) {
    const skus = new Set(STATE.reservasDetalle.map(r => r.SKU));
    return STATE.productos.filter(p => skus.has(p.SKU));
  }
  return STATE.productos.filter(p => {
    const r = getStockRow(p.SKU);
    return r && Number(r.Reservado || 0) > 0;
  });
}

// Zonas donde hay reserva vigente del SKU dado.
function zonasConReserva(sku) {
  if (!sku || !STATE.reservasDetalle) return [];
  const cods = new Set(STATE.reservasDetalle.filter(r => r.SKU === sku).map(r => r.Zona));
  return STATE.zonas.filter(z => cods.has(z.Codigo));
}

// Obras donde hay reserva vigente del SKU en la zona dada (si zona vacía, todas).
function obrasConReserva(sku, zona) {
  if (!sku || !STATE.reservasDetalle) return [];
  const obras = new Set(
    STATE.reservasDetalle
      .filter(r => r.SKU === sku && (!zona || r.Zona === zona))
      .map(r => r.Obra)
  );
  return STATE.obras.filter(o => obras.has(o.Codigo));
}

// Cantidad reservada vigente para SKU + zona + obra (0 si no hay).
function reservaVigente(sku, zona, obra) {
  if (!STATE.reservasDetalle) return 0;
  const row = STATE.reservasDetalle.find(r => r.SKU === sku && r.Zona === zona && r.Obra === obra);
  return row ? Number(row.Cantidad || 0) : 0;
}

// ============== COMBOBOX (input + dropdown con búsqueda predictiva) ==============
window._comboData = {};
window._comboCallbacks = {};

function comboInit(hiddenId, items, selectedValue, callback) {
  window._comboData[hiddenId] = items || [];
  window._comboCallbacks[hiddenId] = callback || null;
  const hidden = document.getElementById(hiddenId);
  const search = document.getElementById(hiddenId + '-search');
  if (!hidden || !search) return;
  hidden.value = '';
  search.value = '';
  if (selectedValue) {
    const sel = (items || []).find(it => it.value === selectedValue);
    if (sel) {
      hidden.value = sel.value;
      search.value = sel.label;
    }
  }
}

function comboFilter(hiddenId, text, showAll) {
  const items = window._comboData[hiddenId] || [];
  const list = document.getElementById(hiddenId + '-list');
  const hidden = document.getElementById(hiddenId);
  if (!list) return;
  // Si el usuario edita el texto, invalido la selección previa (va a tener que re-elegir)
  if (!showAll && hidden) hidden.value = '';
  const t = (text || '').toLowerCase().trim();

  // Si el combo es de SKUs (único con recientes por ahora) y no hay filtro,
  // pongo los últimos 3 usados arriba con un header visual.
  const bucket = hiddenId === 'f-sku' ? 'skus'
              : hiddenId === 'eg-sku' ? 'skus'
              : hiddenId === 'rv-sku' ? 'skus'
              : hiddenId === 'lr-sku' ? 'skus'
              : null;

  let html = '';
  if (!t && bucket) {
    const recents = (STATE.recientes && STATE.recientes[bucket]) || [];
    const recentItems = recents.map(v => items.find(it => it.value === v)).filter(Boolean);
    if (recentItems.length > 0) {
      html += '<div class="combo-header">★ Últimos usados</div>';
      html += recentItems.map(it =>
        `<div class="combo-item combo-recent" onmousedown="event.preventDefault()" onclick='comboSelect(${jsStr(hiddenId)}, ${jsStr(it.value)})'>${attrEsc(it.label)}</div>`
      ).join('');
      html += '<div class="combo-header">Todos</div>';
    }
  }

  let filtered = items;
  if (t) {
    filtered = items.filter(it => (it.hay || it.label || '').toLowerCase().includes(t));
  }
  if (filtered.length === 0 && !html) {
    html = '<div class="combo-empty">Sin resultados</div>';
  } else if (filtered.length === 0) {
    // Sólo queda el bloque de recientes
  } else {
    html += filtered.slice(0, 80).map(it =>
      `<div class="combo-item" onmousedown="event.preventDefault()" onclick='comboSelect(${jsStr(hiddenId)}, ${jsStr(it.value)})'>${attrEsc(it.label)}</div>`
    ).join('');
  }
  list.innerHTML = html;
  list.classList.add('open');
}

function comboSelect(hiddenId, value) {
  const items = window._comboData[hiddenId] || [];
  const sel = items.find(it => it.value === value);
  const hidden = document.getElementById(hiddenId);
  const search = document.getElementById(hiddenId + '-search');
  const list = document.getElementById(hiddenId + '-list');
  if (hidden) hidden.value = value;
  if (search) search.value = sel ? sel.label : value;
  if (list) list.classList.remove('open');
  const cb = window._comboCallbacks[hiddenId];
  if (cb) cb();
}

function renderStock() {
  const list = document.getElementById('stock-list');
  const search = (document.getElementById('search-input').value || '').toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  let rows = STATE.stock.filter(r => r.SKU);
  if (STATE.currentZone === 'ALERTAS') rows = rows.filter(r => r.Alerta === 'BAJO STOCK');
  if (search) rows = rows.filter(r =>
    (r.Nombre || '').toString().toLowerCase().includes(search) ||
    (r.SKU || '').toString().toLowerCase().includes(search));
  if (cat) rows = rows.filter(r => r.Categoria === cat);
  if (STATE.currentZone !== 'TODAS' && STATE.currentZone !== 'ALERTAS') {
    rows = rows.filter(r => Number(r[STATE.currentZone] || 0) > 0);
  }
  if (rows.length === 0) { list.innerHTML = '<div class="empty">Sin resultados</div>'; return; }
  list.innerHTML = rows.map(r => {
    const prod = STATE.productos.find(p => p.SKU === r.SKU) || {};
    const foto = prod.Foto_URL || NO_FOTO;
    const chips = STATE.zonas
      .filter(z => Number(r[z.Codigo] || 0) > 0)
      .map(z => `<span class="chip">${attrEsc(z.Nombre)}: ${r[z.Codigo]}</span>`).join('');
    const alerta = r.Alerta === 'BAJO STOCK' ? '<span class="badge-warn">Bajo stock</span>' : '';

      <div class="card" onclick='showDetalle(${jsStr(r.SKU)})'>

  // igual y el usuario pueda al menos ver info del producto y reservar/liberar.

  if (!r) {

    r = {

      Nombre: prod.Nombre || sku,

    ${stockWarnBlock}

    ${packInfo}
    <div class="detail-rows">
      ${zonasRows}

      <div class="row"><span>Reservado</span><span style="color:var(--purple)">${r.Reservado || 0}</span></div>
      <div class="row"><strong>Disponible</strong><strong style="color:var(--primary)">${r.Disponible || 0}</strong></div>
      <div class="row"><span>Mínimo</span><span>${r.Minimo || 0}</span></div>
    </div>
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn btn-purple" onclick='openReservaMasiva(${jsStr(sku)})'>📌 Reservar</button>

        <button type="button" onclick="openNuevoProducto()">+ Nuevo</button>
      </div>
      <div class="hint" id="f-sku-hint">${productosList.length === 0 ? (tipo === 'Libera_Reserva' ? 'No hay productos con reservas vigentes.' : 'Sin productos disponibles.') : productosList.length + ' productos disponibles'}</div>
    </div>
    ${packBlock}
    <div class="field">
      <label><span id="f-cant-label">Cantidad</span></label>
      <input type="number" id="f-cant" step="0.01" inputmode="decimal" oninput="actualizarPackIngreso(); validarCantMov('${tipo}')">
      <div class="hint" id="f-cant-hint"></div>
    </div>
  `;

  if (tipo === 'Ingreso') {
    formFields += `<div class="field"><label>Zona destino</label><select id="f-dest"><option value="">-- elegir --</option>${zonaOptions}</select></div>`;
  } else if (tipo === 'Traslado') {
    formFields += `
      <div class="field"><label>Zona origen</label><select id="f-origen" onchange="validarCantMov('Traslado')"><option value="">-- elegir --</option>${zonaOptions}</select></div>
      <div class="field"><label>Zona destino</label><select id="f-dest"><option value="">-- elegir --</option>${zonaOptions}</select></div>`;
  } else if (tipo === 'Reserva') {
    formFields += `
      <div class="field"><label>Zona origen</label><select id="f-origen" onchange="validarCantMov('Reserva')"><option value="">-- elegir --</option>${zonaOptions}</select></div>
      <div class="field">
        <label>Obra</label>
        <div class="row-with-btn">
          <select id="f-obra"><option value="">-- elegir --</option>${obraOptions}</select>
          <button type="button" onclick="openNuevaObra()">+ Nueva</button>
        </div>
      </div>`;
  } else if (tipo === 'Libera_Reserva') {
    // Arrancan vacíos — se rellenan en onSkuChangeMov/onZonaChangeLiberar
    // mostrando SÓLO zonas/obras con reserva vigente del SKU elegido.
    formFields += `
      <div class="field"><label>Zona origen (con reserva)</label><select id="f-origen" onchange="onZonaChangeLiberar()"><option value="">-- primero elegí un producto --</option></select></div>
      <div class="field"><label>Obra (con reserva)</label><select id="f-obra"><option value="">-- primero elegí zona --</option></select></div>
      <div class="hint" id="f-reserva-hint"></div>`;
  } else if (tipo === 'Ajuste') {
    formFields += `<div class="field"><label>Zona</label><select id="f-origen"><option value="">-- elegir --</option>${zonaOptions}</select></div>
                   <div class="field"><label>Motivo</label><select id="f-motivo">
                     <option value="Rotura">Rotura</option>
                     <option value="Error conteo">Error conteo</option>
                     <option value="Pérdida/robo">Pérdida/robo</option>
                     <option value="Inventario inicial">Inventario inicial</option>
                   </select></div>
                   <div class="hint" style="color:var(--warn)">⚠ Para restar stock, poné la cantidad en negativo (ej: -5). Para sumar, positivo.</div>`;
  }

  formFields += `<div class="field"><label>Notas (opcional)</label><textarea id="f-notas"></textarea></div>`;

  openModal(`
    <h2>${tipoLabel(tipo)}</h2>
    <div id="mov-msg"></div>
    ${formFields}
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-mov" onclick="submitMovimiento('${tipo}')">Guardar</button>
    </div>
  `);

  // Inicializo el combobox con los productos filtrados según tipo
  comboInit('f-sku', productosList.map(p => ({
    value: p.SKU,
    label: `${p.SKU} — ${p.Nombre}`,
    hay: p.Nombre + ' ' + p.SKU + ' ' + (p.Categoria||'') + ' ' + (p.Subcategoria||''),
  })), skuPreseleccionado, () => onSkuChangeMov(tipo));

  if (skuPreseleccionado) onSkuChangeMov(tipo);
}

function onSkuChangeMov(tipo) {
  const sku = document.getElementById('f-sku').value;
  const prod = STATE.productos.find(p => p.SKU === sku);
  const hint = document.getElementById('f-sku-hint');
  const packRow = document.getElementById('pack-toggle-row');

  if (!prod) {
    if (hint) hint.textContent = '';
    if (packRow) packRow.style.display = 'none';
    return;
  }

  const lbl = document.getElementById('f-cant-label');
  if (lbl) lbl.textContent = `Cantidad (${prod.Unidad || ''})`;

  if (tipo === 'Ingreso' && prod.Unidad_Pack && Number(prod.Cantidad_Por_Pack) > 0) {
    if (packRow) {
      packRow.style.display = 'flex';
      document.getElementById('pack-label').textContent =
        `Cargar por ${prod.Unidad_Pack} (1 ${prod.Unidad_Pack} = ${prod.Cantidad_Por_Pack} ${prod.Unidad || ''})`;
    }
  } else if (packRow) {
    packRow.style.display = 'none';
    const chk = document.getElementById('f-usar-pack');
    if (chk) chk.checked = false;
  }

  // En Liberar_Reserva: rellenar zonas/obras SÓLO con las que tienen reserva vigente.
  if (tipo === 'Libera_Reserva') {
    const zonasOk = zonasConReserva(sku);
    const selZ = document.getElementById('f-origen');
    if (selZ) {
      selZ.innerHTML = '<option value="">-- elegir --</option>' +
        zonasOk.map(z => `<option value="${attrEsc(z.Codigo)}">${attrEsc(z.Nombre)}</option>`).join('');
    }
    const selO = document.getElementById('f-obra');
    if (selO) selO.innerHTML = '<option value="">-- primero elegí zona --</option>';
    const rh = document.getElementById('f-reserva-hint');
    if (rh) rh.innerHTML = zonasOk.length
      ? `<span style="color:var(--muted)">Hay reservas en ${zonasOk.length} galp${zonasOk.length === 1 ? 'ón' : 'ones'}.</span>`
      : '<span style="color:var(--warn)">Este producto no tiene reservas vigentes en ningún galpón.</span>';
  }

  actualizarPackIngreso();
  validarCantMov(tipo);
}

function onZonaChangeLiberar() {
  const sku = document.getElementById('f-sku').value;
  const zona = document.getElementById('f-origen').value;
  const selO = document.getElementById('f-obra');
  const rh = document.getElementById('f-reserva-hint');
  if (!sku || !zona) {
    if (selO) selO.innerHTML = '<option value="">-- primero elegí zona --</option>';
    return;
  }
  const obras = obrasConReserva(sku, zona);
  if (selO) {
    selO.innerHTML = '<option value="">-- elegir --</option>' +
      obras.map(o => `<option value="${attrEsc(o.Codigo)}">${attrEsc(o.Codigo)} — ${attrEsc(o.Nombre)}</option>`).join('');
    selO.onchange = () => {
      const obra = selO.value;
      if (!obra) { if (rh) rh.innerHTML = ''; return; }
      const vig = reservaVigente(sku, zona, obra);
      const prod = STATE.productos.find(p => p.SKU === sku) || {};
      if (rh) rh.innerHTML = `<span style="color:var(--purple)">Reserva vigente en esta combinación: <strong>${vig}</strong> ${attrEsc(prod.Unidad || '')}</span>`;
    };
  }
  if (rh) rh.innerHTML = obras.length
    ? '<span style="color:var(--muted)">Elegí la obra.</span>'
    : '<span style="color:var(--warn)">No hay obras con reserva vigente en esta zona.</span>';
}

function actualizarPackIngreso() {
  const r = document.getElementById('pack-result');
  if (!r) return;
  const chk = document.getElementById('f-usar-pack');
  const sku = document.getElementById('f-sku').value;
  const prod = STATE.productos.find(p => p.SKU === sku);
  const cant = parseFloat(document.getElementById('f-cant').value || '0');
  if (chk && chk.checked && prod && Number(prod.Cantidad_Por_Pack) > 0 && cant > 0) {
    const total = cant * Number(prod.Cantidad_Por_Pack);
    r.innerHTML = `<span style="color:var(--accent);font-weight:600">→ Se van a ingresar <strong>${total}</strong> ${prod.Unidad || ''} (${cant} × ${prod.Cantidad_Por_Pack})</span>`;
  } else {
    r.innerHTML = '';
  }
}

function validarCantMov(tipo) {
  const hint = document.getElementById('f-cant-hint');
  const btn = document.getElementById('btn-guardar-mov');
  if (!hint || !btn) return;
  hint.innerHTML = '';
  btn.disabled = false;
  if (tipo !== 'Traslado' && tipo !== 'Reserva' && tipo !== 'Libera_Reserva') return;

  const sku = document.getElementById('f-sku').value;
  const zo = document.getElementById('f-origen') ? document.getElementById('f-origen').value : '';
  if (!sku || !zo) return;

  const cant = parseFloat(document.getElementById('f-cant').value || '0');

  if (tipo === 'Libera_Reserva') {
    const obra = document.getElementById('f-obra') ? document.getElementById('f-obra').value : '';
    if (!obra) return;
    const vig = reservaVigente(sku, zo, obra);
    hint.innerHTML = `<span style="color:var(--muted)">Reserva vigente: <strong>${vig}</strong></span>`;
    if (cant > 0 && cant > vig) {
      hint.innerHTML = `<span style="color:var(--warn)">⚠ Excede la reserva vigente (${vig}). No vas a poder guardar.</span>`;
      btn.disabled = true;
    }
    return;
  }

  const disp = getStockEnZona(sku, zo);
  hint.innerHTML = `<span style="color:var(--muted)">Disponible en esa zona: <strong>${disp}</strong></span>`;
  if (cant > 0 && cant > disp) {
    hint.innerHTML = `<span style="color:var(--warn)">⚠ Excede lo disponible (${disp}). No vas a poder guardar.</span>`;
    btn.disabled = true;
  }
}

function tipoLabel(t) {
  return {
    Ingreso: '+ Nuevo Ingreso',
    Traslado: '↔ Traslado entre galpones',
    Egreso: '→ Egreso a Obra',
    Ajuste: '± Ajuste de stock',
    Reserva: '📌 Reservar para Obra',
    Libera_Reserva: '↺ Liberar reserva',
  }[t] || t;
}

async function submitMovimiento(tipo) {
  try {
    let cantidad = parseFloat(document.getElementById('f-cant').value || '0');
    const sku = document.getElementById('f-sku').value;
    const prod = STATE.productos.find(p => p.SKU === sku);

    if (tipo === 'Ingreso' || tipo === 'Traslado') {
      const chk = document.getElementById('f-usar-pack');
      if (chk && chk.checked && prod && Number(prod.Cantidad_Por_Pack) > 0) {
        cantidad = cantidad * Number(prod.Cantidad_Por_Pack);
      }
    }

    const payload = {
      tipo, sku, cantidad,
      usuario: SESSION ? SESSION.user : '',
      notas: document.getElementById('f-notas').value,
    };
    if (tipo === 'Ingreso') payload.zonaDestino = document.getElementById('f-dest').value;
    if (tipo === 'Traslado') {
      payload.zonaOrigen = document.getElementById('f-origen').value;
      payload.zonaDestino = document.getElementById('f-dest').value;
    }
    if (tipo === 'Reserva' || tipo === 'Libera_Reserva') {
      payload.zonaOrigen = document.getElementById('f-origen').value;
      payload.obra = document.getElementById('f-obra').value;
    }
    if (tipo === 'Ajuste') {
      payload.zonaOrigen = document.getElementById('f-origen').value;
      payload.motivo = document.getElementById('f-motivo').value;
      // Confirmación: detecta signo → Ingreso/Egreso
      const signo = cantidad >= 0 ? 'Ingreso' : 'Egreso';
      const abs = Math.abs(cantidad);
      const nomProd = prod ? prod.Nombre : sku;
      const unidad = prod && prod.Unidad ? ' ' + prod.Unidad : '';
      const motivo = payload.motivo || '(sin motivo)';
      if (!confirm(`¿Confirmás este ${signo} de ${abs}${unidad} de "${nomProd}" por "${motivo}"?`)) return;
    }
    await api('addMovimiento', payload);

    // Recientes: último SKU/obra/zona elegidos para el autocompletar
    pushReciente('skus', sku);
    if (payload.obra) pushReciente('obras', payload.obra);
    if (payload.zonaOrigen) pushReciente('zonas', payload.zonaOrigen);
    if (payload.zonaDestino) pushReciente('zonas', payload.zonaDestino);

    closeModal();
    haptic('ok');
    toast(`${tipoLabel(tipo)} registrado`, {
      type: 'ok',
      undo: () => anularMovimiento(payload),
    });
    init();
  } catch (err) {
    haptic('err');
    const msgEl = document.getElementById('mov-msg');
    if (msgEl) msgEl.innerHTML = `<div class="alert alert-err">${attrEsc(err.message)}</div>`;
    toast(err.message || 'Error desconocido', { type: 'err' });
  }
}

// ============== EGRESO MASIVO ==============
function openEgresoMasivo(skuPreseleccionado) {
  STATE.egresoBasket = [];
  if (skuPreseleccionado) {
    const prod = STATE.productos.find(p => p.SKU === skuPreseleccionado);
    if (prod) {
      const zonas = getZonasConStock(skuPreseleccionado);
      if (zonas.length > 0) {
        STATE.egresoBasket.push({ sku: skuPreseleccionado, zona: zonas[0].Codigo, cantidad: '' });
      }
    }
  }
  if (STATE.egresoBasket.length === 0) {
    STATE.egresoBasket.push({ sku: '', zona: '', cantidad: '' });
  }

  const obraOptions = buildObraOptions({ onlyActive: true });

  openModal(`
    <h2>→ Egreso a Obra</h2>
    <div id="mov-msg"></div>
    <div class="field">
      <label>Obra *</label>
      <div class="row-with-btn">
        <select id="eg-obra"><option value="">-- elegir --</option>${obraOptions}</select>
        <button type="button" onclick="openNuevaObra()">+ Nueva</button>
      </div>
    </div>
    <div class="field"><label>Notas (se aplican a todos)</label><textarea id="eg-notas" placeholder="ej: remito, camión, quien retiró"></textarea></div>
    <h3 style="color:var(--orange);font-size:15px;margin:10px 0 6px;">🛒 Productos a retirar</h3>
    <div id="eg-basket"></div>
    <button class="add-line-btn" onclick="egregarLinea()">+ Agregar otro producto</button>
    <div class="hint" id="eg-summary" style="text-align:right;"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-orange" id="eg-btn" onclick="submitEgresoMasivo()">Guardar todo</button>
    </div>
  `);
  renderEgresoBasket();
}

function egregarLinea() { STATE.egresoBasket.push({ sku: '', zona: '', cantidad: '' }); renderEgresoBasket(); }
function egQuitarLinea(idx) {
  STATE.egresoBasket.splice(idx, 1);
  if (STATE.egresoBasket.length === 0) egregarLinea();
  renderEgresoBasket();
}
function onEgSkuChange(idx, value) {
  STATE.egresoBasket[idx].sku = value;
  const zonas = getZonasConStock(value);
  const actual = STATE.egresoBasket[idx].zona;
  if (!zonas.find(z => z.Codigo === actual)) {
    STATE.egresoBasket[idx].zona = zonas.length > 0 ? zonas[0].Codigo : '';
  }
  renderEgresoBasket();
}
function onEgZonaChange(idx, value) { STATE.egresoBasket[idx].zona = value; renderEgresoBasket(); }
function onEgCantChange(idx, value) { STATE.egresoBasket[idx].cantidad = value; validarEgresoBasket(); }

function renderEgresoBasket() {
  const c = document.getElementById('eg-basket');
  if (!c) return;
  const prodElegibles = productosConStock();

  c.innerHTML = STATE.egresoBasket.map((line, idx) => {
    const prod = STATE.productos.find(p => p.SKU === line.sku);
    const zonasConStock = line.sku ? getZonasConStock(line.sku) : [];

    const prodOpts = prodElegibles.map(p =>
      `<option value="${attrEsc(p.SKU)}" ${line.sku === p.SKU ? 'selected' : ''}>${attrEsc(p.SKU)} — ${attrEsc(p.Nombre)}</option>`
    ).join('');

    const zonaOpts = zonasConStock.map(z => {
      const st = getStockEnZona(line.sku, z.Codigo);
      return `<option value="${attrEsc(z.Codigo)}" ${line.zona === z.Codigo ? 'selected' : ''}>${attrEsc(z.Nombre)} (disp: ${st})</option>`;
    }).join('');

    const dispLinea = line.sku && line.zona ? getStockEnZona(line.sku, line.zona) : 0;
    const cantNum = parseFloat(line.cantidad || '0');
    const excede = cantNum > 0 && cantNum > dispLinea;

    return `
      <div class="basket-line">
        <button class="del-x" onclick="egQuitarLinea(${idx})" title="Quitar">✕</button>
        <div class="head">Producto ${idx + 1}</div>
        <div class="field">
          <select onchange="onEgSkuChange(${idx}, this.value)">
            <option value="">-- elegir producto --</option>
            ${prodElegibles.length === 0 ? '<option disabled>No hay productos con stock</option>' : ''}
            ${prodOpts}
          </select>
        </div>
        ${line.sku ? `
          <div class="field-row">
            <div class="field">
              <label>Zona origen</label>
              <select onchange="onEgZonaChange(${idx}, this.value)">
                ${zonasConStock.length ? zonaOpts : '<option value="">Sin stock en ningún galpón</option>'}
              </select>
            </div>
            <div class="field">
              <label>Cantidad${prod ? ' (' + attrEsc(prod.Unidad || '') + ')' : ''}</label>
              <input type="number" step="0.01" inputmode="decimal" value="${attrEsc(line.cantidad)}" oninput="onEgCantChange(${idx}, this.value)">
            </div>
          </div>
          ${excede ? `<div class="alert alert-err" style="margin:4px 0 0;">⚠ Excede lo disponible (${dispLinea} ${prod ? attrEsc(prod.Unidad || '') : ''})</div>` : ''}
        ` : ''}
      </div>`;
  }).join('');

  validarEgresoBasket();
}

function validarEgresoBasket() {
  const btn = document.getElementById('eg-btn');
  const sum = document.getElementById('eg-summary');
  if (!btn) return;
  let anyLineOk = false, anyBad = false;
  const acc = {};
  for (const l of STATE.egresoBasket) {
    const cant = parseFloat(l.cantidad || '0');
    if (!l.sku || !l.zona || !(cant > 0)) continue;
    const key = l.sku + '||' + l.zona;
    acc[key] = (acc[key] || 0) + cant;
    anyLineOk = true;
  }
  for (const key of Object.keys(acc)) {
    const [sku, zona] = key.split('||');
    if (acc[key] > getStockEnZona(sku, zona)) anyBad = true;
  }
  btn.disabled = !anyLineOk || anyBad;
  if (sum) {
    const lineasOk = Object.keys(acc).length;
    sum.textContent = lineasOk ? `${lineasOk} ${lineasOk === 1 ? 'producto listo' : 'productos listos'} para egresar` : '';
  }
}

async function submitEgresoMasivo() {
  const obra = document.getElementById('eg-obra').value;
  const notas = document.getElementById('eg-notas').value;
  if (!obra) { document.getElementById('mov-msg').innerHTML = '<div class="alert alert-err">Elegí una obra</div>'; haptic('err'); return; }

  const lineas = STATE.egresoBasket.filter(l => {
    const c = parseFloat(l.cantidad || '0');
    return l.sku && l.zona && c > 0;
  });
  if (lineas.length === 0) { document.getElementById('mov-msg').innerHTML = '<div class="alert alert-err">Cargá al menos un producto</div>'; haptic('err'); return; }

  document.getElementById('mov-msg').innerHTML = `<div class="alert alert-info">Guardando ${lineas.length} egresos...</div>`;

  const emitted = [];
  let okCount = 0, errs = [];
  for (const l of lineas) {
    const payload = {
      tipo: 'Egreso', sku: l.sku, cantidad: parseFloat(l.cantidad),
      zonaOrigen: l.zona, obra,
      usuario: SESSION ? SESSION.user : '',
      notas,
    };
    try {
      await api('addMovimiento', payload);
      emitted.push(payload);
      okCount++;
    } catch (err) {
      errs.push(`${l.sku}: ${err.message}`);
    }
  }
  if (errs.length === 0) {
    pushReciente('obras', obra);
    for (const m of emitted) { pushReciente('skus', m.sku); pushReciente('zonas', m.zonaOrigen); }
    closeModal();
    haptic('ok');
    toast(`${okCount} ${okCount === 1 ? 'egreso registrado' : 'egresos registrados'}`, {
      type: 'ok',
      undo: () => undoBatch(emitted),
    });
    init();
  } else {
    haptic('err');
    document.getElementById('mov-msg').innerHTML =
      `<div class="alert alert-ok">${okCount} OK</div>` +
      `<div class="alert alert-err">${errs.length} con error:<br>${errs.map(attrEsc).join('<br>')}</div>`;
    toast(`${errs.length} ${errs.length === 1 ? 'egreso falló' : 'egresos fallaron'}`, {
      type: 'err',
      sub: okCount ? `${okCount} OK, ${errs.length} con error` : '',
    });
    init();
  }
}

      <div class="row-with-btn">

function rvAgregarLinea() { STATE.reservaBasket.push({ sku: '', zona: '', cantidad: '' }); renderReservaBasket(); }
function rvQuitarLinea(idx) {
  STATE.reservaBasket.splice(idx, 1);
  if (STATE.reservaBasket.length === 0) rvAgregarLinea();
  renderReservaBasket();
}
function onRvSkuChange(idx, value) {
  STATE.reservaBasket[idx].sku = value;

  const actual = STATE.reservaBasket[idx].zona;
