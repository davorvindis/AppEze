  }
  renderReservaBasket();
}
function onRvZonaChange(idx, value) { STATE.reservaBasket[idx].zona = value; renderReservaBasket(); }
function onRvCantChange(idx, value) { STATE.reservaBasket[idx].cantidad = value; validarReservaBasket(); }

function renderReservaBasket() {
  const c = document.getElementById('rv-basket');
  if (!c) return;
  const prodElegibles = productosConStock();

  c.innerHTML = STATE.reservaBasket.map((line, idx) => {
    const prod = STATE.productos.find(p => p.SKU === line.sku);
    const zonasConStock = line.sku ? getZonasConStock(line.sku) : [];

    const prodOpts = prodElegibles.map(p =>
      `<option value="${attrEsc(p.SKU)}" ${line.sku === p.SKU ? 'selected' : ''}>${attrEsc(p.SKU)} — ${attrEsc(p.Nombre)}</option>`
    ).join('');

    const zonaOpts = zonasConStock.map(z => {
      const st = getStockEnZona(line.sku, z.Codigo);
      return `<option value="${attrEsc(z.Codigo)}" ${line.zona === z.Codigo ? 'selected' : ''}>${attrEsc(z.Nombre)} (disp: ${st})</option>`;
    }).join('');

    const dispLinea = line.sku && line.zona ? getStockEnZona(line.sku, line.zona) : 0;
    const cantNum = parseFloat(line.cantidad || '0');
    const excede = cantNum > 0 && cantNum > dispLinea;

    return `
      <div class="basket-line">
        <button class="del-x" onclick="rvQuitarLinea(${idx})" title="Quitar">✕</button>
        <div class="head">Producto ${idx + 1}</div>
        <div class="field">
          <select onchange="onRvSkuChange(${idx}, this.value)">
            <option value="">-- elegir producto --</option>
            ${prodElegibles.length === 0 ? '<option disabled>No hay productos con stock</option>' : ''}
            ${prodOpts}
          </select>
        </div>
        ${line.sku ? `
          <div class="field-row">
            <div class="field">
              <label>Zona origen</label>
              <select onchange="onRvZonaChange(${idx}, this.value)">
                ${zonasConStock.length ? zonaOpts : '<option value="">Sin stock en ningún galpón</option>'}
              </select>
            </div>
            <div class="field">
              <label>Cantidad${prod ? ' (' + attrEsc(prod.Unidad || '') + ')' : ''}</label>
              <input type="number" step="0.01" inputmode="decimal" value="${attrEsc(line.cantidad)}" oninput="onRvCantChange(${idx}, this.value)">
            </div>
          </div>
          ${excede ? `<div class="alert alert-err" style="margin:4px 0 0;">⚠ Excede lo disponible (${dispLinea} ${prod ? attrEsc(prod.Unidad || '') : ''})</div>` : ''}
        ` : ''}
      </div>`;
  }).join('');

  validarReservaBasket();
}

function validarReservaBasket() {
  const btn = document.getElementById('rv-btn');
  const sum = document.getElementById('rv-summary');
  if (!btn) return;
  let anyLineOk = false, anyBad = false;
  const acc = {};
  for (const l of STATE.reservaBasket) {
    const cant = parseFloat(l.cantidad || '0');
    if (!l.sku || !l.zona || !(cant > 0)) continue;
    const key = l.sku + '||' + l.zona;
    acc[key] = (acc[key] || 0) + cant;
    anyLineOk = true;
  }
  for (const key of Object.keys(acc)) {
    const [sku, zona] = key.split('||');
    if (acc[key] > getStockEnZona(sku, zona)) anyBad = true;
  }
  btn.disabled = !anyLineOk || anyBad;
  if (sum) {
    const n = Object.keys(acc).length;
    sum.textContent = n ? `${n} ${n === 1 ? 'producto listo' : 'productos listos'} para reservar` : '';
  }
}

async function submitReservaMasiva() {
  const obra = document.getElementById('rv-obra').value;
  const notas = document.getElementById('rv-notas').value;
  if (!obra) { document.getElementById('mov-msg').innerHTML = '<div class="alert alert-err">Elegí una obra</div>'; haptic('err'); return; }

  const lineas = STATE.reservaBasket.filter(l => {
    const c = parseFloat(l.cantidad || '0');
    return l.sku && l.zona && c > 0;
  });
  if (lineas.length === 0) { document.getElementById('mov-msg').innerHTML = '<div class="alert alert-err">Cargá al menos un producto</div>'; haptic('err'); return; }

  document.getElementById('mov-msg').innerHTML = `<div class="alert alert-info">Guardando ${lineas.length} reservas...</div>`;

  const emitted = [];
  let okCount = 0, errs = [];
  for (const l of lineas) {
    const payload = {
      tipo: 'Reserva', sku: l.sku, cantidad: parseFloat(l.cantidad),
      zonaOrigen: l.zona, obra,
      usuario: SESSION ? SESSION.user : '',
      notas,
    };
    try {
      await api('addMovimiento', payload);
      emitted.push(payload);
      okCount++;
    } catch (err) {
      errs.push(`${l.sku}: ${err.message}`);
    }
  }
  if (errs.length === 0) {
    pushReciente('obras', obra);
    for (const m of emitted) { pushReciente('skus', m.sku); pushReciente('zonas', m.zonaOrigen); }
    closeModal();
    haptic('ok');
    toast(`${okCount} ${okCount === 1 ? 'reserva registrada' : 'reservas registradas'}`, {
      type: 'ok',
      undo: () => undoBatch(emitted),
    });
    init();
  } else {
    haptic('err');
    document.getElementById('mov-msg').innerHTML =
      `<div class="alert alert-ok">${okCount} OK</div>` +
      `<div class="alert alert-err">${errs.length} con error:<br>${errs.map(attrEsc).join('<br>')}</div>`;
    toast(`${errs.length} ${errs.length === 1 ? 'reserva falló' : 'reservas fallaron'}`, {
      type: 'err',
      sub: okCount ? `${okCount} OK, ${errs.length} con error` : '',
    });
    init();
  }
}

// ============== LIBERAR RESERVA MASIVO ==============
// Cada línea lleva {sku, zona, obra, cantidad}. Las tres primeras se
// eligen desde las reservas vigentes (STATE.reservasDetalle).
// Cada línea tiene: SKU, zona+obra ORIGEN (de donde se libera la reserva)
// y un DESTINO configurable (galpón o obra). Por default, el destino es
// "galpón = mismo que origen" — o sea, simplemente liberar la reserva.
// El usuario puede elegir otro galpón (queda traslado implícito) o una
// obra distinta (queda egreso implícito).
function _liberaLineaVacia() {
  return { sku: '', zona: '', obra: '', cantidad: '', destTipo: 'galpon', destZona: '', destObra: '' };
}
function openLiberaMasiva(skuPreseleccionado) {
  STATE.liberaBasket = [];
  if (skuPreseleccionado) {
    const reservas = (STATE.reservasDetalle || []).filter(r => r.SKU === skuPreseleccionado);
    const l = _liberaLineaVacia();
    l.sku = skuPreseleccionado;
    if (reservas.length === 1) {
      l.zona = reservas[0].Zona;
      l.obra = reservas[0].Obra;
      l.destZona = reservas[0].Zona; // default: mismo galpón
    }
    STATE.liberaBasket.push(l);
  }
  if (STATE.liberaBasket.length === 0) {
    STATE.liberaBasket.push(_liberaLineaVacia());
  }

  openModal(`
    <h2>↺ Liberar reservas</h2>
    <div id="mov-msg"></div>
    <div class="field"><label>Notas (se aplican a todas)</label><textarea id="lr-notas" placeholder="ej: motivo de la liberación"></textarea></div>
    <h3 style="color:#475569;font-size:15px;margin:10px 0 6px;">🛒 Reservas a liberar</h3>
    <div id="lr-basket"></div>
    <button class="add-line-btn" onclick="lrAgregarLinea()">+ Agregar otra reserva</button>
    <div class="hint" id="lr-summary" style="text-align:right;"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-purple" id="lr-btn" onclick="submitLiberaMasiva()">Liberar todo</button>
    </div>
  `);
  renderLiberaBasket();
}

function lrAgregarLinea() { STATE.liberaBasket.push(_liberaLineaVacia()); renderLiberaBasket(); }
function lrQuitarLinea(idx) {
  STATE.liberaBasket.splice(idx, 1);
  if (STATE.liberaBasket.length === 0) lrAgregarLinea();
  renderLiberaBasket();
}
function onLrSkuChange(idx, value) {
  const line = STATE.liberaBasket[idx];
  line.sku = value;
  const zonas = zonasConReserva(value);
  if (!zonas.find(z => z.Codigo === line.zona)) {
    line.zona = zonas.length === 1 ? zonas[0].Codigo : '';
    line.obra = '';
  }
  const obras = obrasConReserva(value, line.zona);
  if (obras.length === 1) line.obra = obras[0].Codigo;
  // El destino default sigue al origen salvo que el usuario haya cambiado algo
  if (!line.destZona || line.destZona === '' /* aun sin tocar */) line.destZona = line.zona;
  renderLiberaBasket();
}
function onLrZonaChange(idx, value) {
  const line = STATE.liberaBasket[idx];
  const prevZona = line.zona;
  line.zona = value;
  const obras = obrasConReserva(line.sku, value);
  if (!obras.find(o => o.Codigo === line.obra)) {
    line.obra = obras.length === 1 ? obras[0].Codigo : '';
  }
  // Si el destino estaba sincronizado con el origen anterior, lo resincronizamos
  if (!line.destZona || line.destZona === prevZona) line.destZona = value;
  renderLiberaBasket();
}
function onLrObraChange(idx, value) { STATE.liberaBasket[idx].obra = value; renderLiberaBasket(); }
function onLrCantChange(idx, value) { STATE.liberaBasket[idx].cantidad = value; validarLiberaBasket(); }
function onLrDestTipoChange(idx, value) {
  const line = STATE.liberaBasket[idx];
  line.destTipo = value;
  // Si cambia a "galpón" y no hay destZona, default al origen. Si cambia a "obra", limpio destObra.
  if (value === 'galpon' && !line.destZona) line.destZona = line.zona;
  if (value === 'obra') line.destObra = line.destObra || '';
  renderLiberaBasket();
}
function onLrDestZonaChange(idx, value) { STATE.liberaBasket[idx].destZona = value; renderLiberaBasket(); }
function onLrDestObraChange(idx, value) { STATE.liberaBasket[idx].destObra = value; renderLiberaBasket(); }

function renderLiberaBasket() {
  const c = document.getElementById('lr-basket');
  if (!c) return;
  const prodElegibles = productosConReserva();

  c.innerHTML = STATE.liberaBasket.map((line, idx) => {
    const prod = STATE.productos.find(p => p.SKU === line.sku);
    const zonas = line.sku ? zonasConReserva(line.sku) : [];
    const obras = (line.sku && line.zona) ? obrasConReserva(line.sku, line.zona) : [];

    const prodOpts = prodElegibles.map(p =>
      `<option value="${attrEsc(p.SKU)}" ${line.sku === p.SKU ? 'selected' : ''}>${attrEsc(p.SKU)} — ${attrEsc(p.Nombre)}</option>`
    ).join('');

    const zonaOpts = zonas.map(z => {
      // cantidad total reservada en esa zona para el SKU (sumando todas las obras)
      const totalZona = (STATE.reservasDetalle || [])
        .filter(r => r.SKU === line.sku && r.Zona === z.Codigo)
        .reduce((a, r) => a + Number(r.Cantidad || 0), 0);
      const nObras = (STATE.reservasDetalle || [])
        .filter(r => r.SKU === line.sku && r.Zona === z.Codigo).length;
      const suffix = nObras > 1 ? ` · ${totalZona} reservadas en ${nObras} obras` : ` · ${totalZona} reservadas`;
      return `<option value="${attrEsc(z.Codigo)}" ${line.zona === z.Codigo ? 'selected' : ''}>${attrEsc(z.Nombre)}${suffix}</option>`;
    }).join('');

    const obraOpts = obras.map(o => {
      const vig = reservaVigente(line.sku, line.zona, o.Codigo);
      const unid = prod && prod.Unidad ? ' ' + prod.Unidad : '';
      return `<option value="${attrEsc(o.Codigo)}" ${line.obra === o.Codigo ? 'selected' : ''}>${attrEsc(o.Codigo)} — ${attrEsc(o.Nombre)} · reservado: ${vig}${attrEsc(unid)}</option>`;
    }).join('');

    const vigLinea = (line.sku && line.zona && line.obra) ? reservaVigente(line.sku, line.zona, line.obra) : 0;
    const cantNum = parseFloat(line.cantidad || '0');
    const excede = cantNum > 0 && cantNum > vigLinea;
    const quedara = vigLinea - (excede ? 0 : cantNum);

    // Opciones de destino
    const zonaDestOpts = STATE.zonas.map(z =>
      `<option value="${attrEsc(z.Codigo)}" ${line.destZona === z.Codigo ? 'selected' : ''}>${attrEsc(z.Nombre)}${z.Codigo === line.zona ? ' (mismo que origen)' : ''}</option>`
    ).join('');
    const obraDestOpts = STATE.obras.filter(o => o.Estado !== 'Finalizada').map(o =>
      `<option value="${attrEsc(o.Codigo)}" ${line.destObra === o.Codigo ? 'selected' : ''}>${attrEsc(o.Codigo)} — ${attrEsc(o.Nombre)}</option>`
    ).join('');

    // Descripción del efecto resultante (hint para el usuario)
    let destHint = '';
    if (line.destTipo === 'galpon' && line.destZona) {
      if (line.destZona === line.zona) {
        destHint = 'Libera la reserva y el stock queda disponible en el mismo galpón.';
      } else {
        const zDest = STATE.zonas.find(z => z.Codigo === line.destZona);
        destHint = `Libera la reserva y traslada a ${zDest ? zDest.Nombre : line.destZona}.`;
      }
    } else if (line.destTipo === 'obra' && line.destObra) {
      const oDest = STATE.obras.find(o => o.Codigo === line.destObra);
      destHint = `Libera la reserva y hace egreso${oDest ? ' a ' + oDest.Nombre : ''}.`;
    }

    return `
      <div class="basket-line">
        <button class="del-x" onclick="lrQuitarLinea(${idx})" title="Quitar">✕</button>
        <div class="head">Reserva ${idx + 1}</div>
        <div class="field">
          <select onchange="onLrSkuChange(${idx}, this.value)">
            <option value="">-- elegir producto con reserva --</option>
            ${prodElegibles.length === 0 ? '<option disabled>No hay productos con reservas vigentes</option>' : ''}
            ${prodOpts}
          </select>
        </div>
        ${line.sku ? `
          <div class="field-row">
            <div class="field">
              <label>Galpón (origen)</label>
              <select onchange="onLrZonaChange(${idx}, this.value)">
                <option value="">-- elegir --</option>
                ${zonaOpts || '<option disabled>Sin reservas en ningún galpón</option>'}
              </select>
            </div>
            <div class="field">
              <label>Obra (reservó)</label>
              <select onchange="onLrObraChange(${idx}, this.value)" ${line.zona ? '' : 'disabled'}>
                <option value="">${line.zona ? '-- elegir --' : 'primero elegí galpón'}</option>
                ${obraOpts}
              </select>
            </div>
          </div>
          ${line.obra ? `
            <div class="field">
              <label>Cantidad a liberar${prod ? ' (' + attrEsc(prod.Unidad || '') + ')' : ''} — reservado en esta obra: <strong style="color:var(--purple)">${vigLinea}</strong></label>
              <input type="number" step="0.01" inputmode="decimal" max="${vigLinea}" value="${attrEsc(line.cantidad)}" oninput="onLrCantChange(${idx}, this.value)" placeholder="Ej: ${vigLinea} para liberar toda la reserva">
              ${cantNum > 0 && !excede ? `<div class="hint" style="margin-top:4px;">Quedarán <strong>${quedara}</strong> ${attrEsc(prod && prod.Unidad ? prod.Unidad : 'u.')} reservadas para esta obra después de liberar.</div>` : ''}
            </div>
            ${excede ? `<div class="alert alert-err" style="margin:4px 0 0;">⚠ Excede la reserva de esta obra (máximo: ${vigLinea})</div>` : ''}
            <div class="field" style="margin-top:8px;">
              <label>¿A dónde va el stock liberado?</label>
              <div class="seg" style="display:flex;gap:6px;margin-bottom:6px;">
                <label class="seg-opt ${line.destTipo === 'galpon' ? 'on' : ''}" style="flex:1;cursor:pointer;padding:8px 10px;border:1px solid ${line.destTipo === 'galpon' ? '#6d28d9' : '#cbd5e1'};border-radius:8px;background:${line.destTipo === 'galpon' ? '#ede9fe' : '#fff'};text-align:center;font-size:14px;">
                  <input type="radio" name="lr-dt-${idx}" value="galpon" ${line.destTipo === 'galpon' ? 'checked' : ''} onchange="onLrDestTipoChange(${idx}, 'galpon')" style="margin-right:4px;"> 🏬 Al galpón
                </label>
                <label class="seg-opt ${line.destTipo === 'obra' ? 'on' : ''}" style="flex:1;cursor:pointer;padding:8px 10px;border:1px solid ${line.destTipo === 'obra' ? '#6d28d9' : '#cbd5e1'};border-radius:8px;background:${line.destTipo === 'obra' ? '#ede9fe' : '#fff'};text-align:center;font-size:14px;">
                  <input type="radio" name="lr-dt-${idx}" value="obra" ${line.destTipo === 'obra' ? 'checked' : ''} onchange="onLrDestTipoChange(${idx}, 'obra')" style="margin-right:4px;"> 🏗️ A otra obra
                </label>
              </div>
              ${line.destTipo === 'galpon' ? `
                <select onchange="onLrDestZonaChange(${idx}, this.value)">
                  <option value="">-- elegir galpón destino --</option>
                  ${zonaDestOpts}
                </select>
              ` : `
                <select onchange="onLrDestObraChange(${idx}, this.value)">
                  <option value="">-- elegir obra destino --</option>
                  ${obraDestOpts}
                </select>
              `}
              ${destHint ? `<div class="hint" style="margin-top:4px;color:#6d28d9;">${destHint}</div>` : ''}
            </div>
          ` : ''}
        ` : ''}
      </div>`;
  }).join('');

  validarLiberaBasket();
}

function validarLiberaBasket() {
  const btn = document.getElementById('lr-btn');
  const sum = document.getElementById('lr-summary');
  if (!btn) return;
  let anyLineOk = false, anyBad = false;
  const acc = {};
  for (const l of STATE.liberaBasket) {
    const cant = parseFloat(l.cantidad || '0');
    if (!l.sku || !l.zona || !l.obra || !(cant > 0)) continue;
    // Validar destino
    if (l.destTipo === 'galpon' && !l.destZona) continue;
    if (l.destTipo === 'obra' && !l.destObra) continue;
    const key = l.sku + '||' + l.zona + '||' + l.obra;
    acc[key] = (acc[key] || 0) + cant;
    anyLineOk = true;
  }
  for (const key of Object.keys(acc)) {
    const [sku, zona, obra] = key.split('||');
    if (acc[key] > reservaVigente(sku, zona, obra)) anyBad = true;
  }
  btn.disabled = !anyLineOk || anyBad;
  if (sum) {
    const n = Object.keys(acc).length;
    sum.textContent = n ? `${n} ${n === 1 ? 'reserva lista' : 'reservas listas'} para liberar` : '';
  }
}

async function submitLiberaMasiva() {
  const notas = document.getElementById('lr-notas').value;

  const lineas = STATE.liberaBasket.filter(l => {
    const c = parseFloat(l.cantidad || '0');
    if (!l.sku || !l.zona || !l.obra || !(c > 0)) return false;
    if (l.destTipo === 'galpon' && !l.destZona) return false;
    if (l.destTipo === 'obra' && !l.destObra) return false;
    return true;
  });
  if (lineas.length === 0) { document.getElementById('mov-msg').innerHTML = '<div class="alert alert-err">Cargá al menos una reserva con destino</div>'; haptic('err'); return; }

  // Calcular total de movimientos a crear para mostrar progreso real
  const totalMovs = lineas.reduce((a, l) => {
    // Siempre 1 (Libera_Reserva). +1 si hay traslado o egreso.
    let n = 1;
    if (l.destTipo === 'galpon' && l.destZona !== l.zona) n++;
    if (l.destTipo === 'obra') n++;
    return a + n;
  }, 0);

  document.getElementById('mov-msg').innerHTML = `<div class="alert alert-info">Procesando ${lineas.length} ${lineas.length === 1 ? 'reserva' : 'reservas'} (${totalMovs} movimientos)...</div>`;

  const usuario = SESSION ? SESSION.user : '';
  const emitted = [];
  let okCount = 0, errs = [];

  for (const l of lineas) {
    const cant = parseFloat(l.cantidad);
    try {
      // 1) Siempre libero la reserva primero
      const libPayload = {
        tipo: 'Libera_Reserva', sku: l.sku, cantidad: cant,
        zonaOrigen: l.zona, obra: l.obra,
        usuario, notas: notas ? `[Libera] ${notas}` : '',
      };
      await api('addMovimiento', libPayload);
      emitted.push(libPayload);

      // 2) Traslado a otro galpón (opcional)
      if (l.destTipo === 'galpon' && l.destZona && l.destZona !== l.zona) {
        const trsPayload = {
          tipo: 'Traslado', sku: l.sku, cantidad: cant,
          zonaOrigen: l.zona, zonaDestino: l.destZona,
          usuario, notas: notas ? `[Traslado post-libera] ${notas}` : 'Traslado por liberación de reserva',
        };
        await api('addMovimiento', trsPayload);
        emitted.push(trsPayload);
      }

      // 3) Egreso a obra distinta (opcional)
      if (l.destTipo === 'obra' && l.destObra) {
        const egrPayload = {
          tipo: 'Egreso', sku: l.sku, cantidad: cant,
          zonaOrigen: l.zona, obra: l.destObra,
          usuario, notas: notas ? `[Egreso post-libera] ${notas}` : 'Egreso por reasignación de reserva',
        };
        await api('addMovimiento', egrPayload);
        emitted.push(egrPayload);
      }

      // Recientes
      pushReciente('skus', l.sku);
      pushReciente('zonas', l.zona);
      pushReciente('obras', l.obra);

      okCount++;
    } catch (err) {
      errs.push(`${l.sku} (${l.zona}→${l.destTipo === 'obra' ? l.destObra : l.destZona}): ${err.message}`);
    }
  }

  if (errs.length === 0) {
    closeModal();
    haptic('ok');
    toast(`${okCount} ${okCount === 1 ? 'reserva liberada' : 'reservas liberadas'}`, {
      type: 'ok',
      sub: totalMovs > okCount ? `${totalMovs} movimientos emitidos` : '',
      undo: () => undoBatch(emitted),
    });
    init();
  } else {
    haptic('err');
    document.getElementById('mov-msg').innerHTML =
      `<div class="alert alert-ok">${okCount} OK</div>` +
      `<div class="alert alert-err">${errs.length} con error:<br>${errs.map(attrEsc).join('<br>')}</div>`;
    toast(`${errs.length} con error al liberar`, {
      type: 'err',
      sub: okCount ? `${okCount} OK, ${errs.length} falló` : '',
    });
    init();
  }
}

// ============== PRODUCTOS ==============
function renderProductos() {
  const list = document.getElementById('productos-list');
  if (!list) return;
  const search = (document.getElementById('prod-search').value || '').toLowerCase();
  let rows = STATE.productos;
  if (search) rows = rows.filter(p =>
    (p.Nombre || '').toString().toLowerCase().includes(search) ||
    (p.SKU || '').toString().toLowerCase().includes(search));
  if (rows.length === 0) { list.innerHTML = '<div class="empty">Sin productos</div>'; return; }
  list.innerHTML = rows.map(p => {
    const stockR = getStockRow(p.SKU) || {};
    const foto = p.Foto_URL || NO_FOTO;
    const packTag = p.Unidad_Pack && p.Cantidad_Por_Pack
      ? `<span class="chip">1 ${attrEsc(p.Unidad_Pack)} = ${p.Cantidad_Por_Pack} ${attrEsc(p.Unidad || '')}</span>`
      : '';
    return `
      <div class="card" style="padding:10px;" onclick='showDetalle(${jsStr(p.SKU)})'>
        <img src="${attrEsc(foto)}" style="width:48px;height:48px;" onerror="this.src=window.NO_FOTO">
        <div class="info">
          <div class="title" style="font-size:14px;">${attrEsc(p.Nombre)}</div>
          <div class="sub">${attrEsc(p.SKU)} · ${attrEsc(p.Categoria || '')}${p.Subcategoria ? ' › ' + attrEsc(p.Subcategoria) : ''}</div>
          ${packTag ? `<div class="chips">${packTag}</div>` : ''}
        </div>
        <div class="totals"><div class="total-big" style="font-size:16px;">${Number(stockR.Disponible || 0)}</div><div class="unit">${attrEsc(p.Unidad || '')}</div></div>
      </div>`;
  }).join('');
}

function updateSubcategorias() {
  const catSel = document.getElementById('p-cat');
  const catNewInput = document.getElementById('p-cat-new');
  if (catSel.value === '__NEW__') {
    catNewInput.style.display = '';
    const sub = document.getElementById('p-subcat');
    const subNew = document.getElementById('p-subcat-new');
    sub.innerHTML = '<option value="__NEW__" selected>+ Nueva subcategoría...</option>';
    subNew.style.display = '';
    return;
  } else {
    catNewInput.style.display = 'none';
    catNewInput.value = '';
  }
  const cat = catSel.value;
  const subs = STATE.categorias.filter(c => c.Categoria === cat && c.Subcategoria).map(c => c.Subcategoria);
  const sel = document.getElementById('p-subcat');
  sel.innerHTML = '<option value="">-- elegir --</option>' +
    subs.map(s => `<option value="${attrEsc(s)}">${attrEsc(s)}</option>`).join('') +
    '<option value="__NEW__">+ Nueva subcategoría...</option>';
  document.getElementById('p-subcat-new').style.display = 'none';
  document.getElementById('p-subcat-new').value = '';
}

function onSubcatChange() {

  const inp = document.getElementById('p-subcat-new');
  inp.style.display = v === '__NEW__' ? '' : 'none';
  if (v !== '__NEW__') inp.value = '';
}

async function submitProducto() {
  try {
    const usePack = document.getElementById('p-use-pack').checked;
    // Resolver cat/subcat (con soporte inline "Nueva")
    let categoria = document.getElementById('p-cat').value;
    if (categoria === '__NEW__') categoria = (document.getElementById('p-cat-new').value || '').trim();
    let subcategoria = document.getElementById('p-subcat').value;
    if (subcategoria === '__NEW__') subcategoria = (document.getElementById('p-subcat-new').value || '').trim();
    if (!categoria) throw new Error('Falta categoría');

    // --- Validación previa: stock inicial sin depósito ---
    // Si el usuario puso cantidad > 0 pero no eligió depósito, le avisamos
    // con un diálogo. Dos opciones: volver a completar la zona, o crear el
    // producto sin registrar stock inicial.
    const stockIniCheck = parseFloat(document.getElementById('p-stock').value || '0');
    const zonaIniCheck  = document.getElementById('p-stock-zona').value;
    let skipStockInicial = false;
    if (stockIniCheck > 0 && !zonaIniCheck) {
      const choice = await customDialog({
        title: 'No indicaste en qué depósito está',
        message: `Cargaste <strong>${stockIniCheck}</strong> de stock inicial pero no elegiste un depósito. ¿Qué querés hacer?`,
        buttons: [
          { key: 'add',  label: '📍 Agregar depósito',         kind: 'primary'   },
          { key: 'skip', label: 'Continuar sin agregar stock', kind: 'secondary' },
        ],
      });
      if (choice === 'add' || choice === null) {
        // Foco en el select para que el usuario lo complete
        const sel = document.getElementById('p-stock-zona');
        if (sel) sel.focus();
        return;
      }
      // choice === 'skip': seguimos, pero sin registrar el ingreso inicial
      skipStockInicial = true;
    }

    const payload = {
      sku: document.getElementById('p-sku').value.trim(),
      nombre: document.getElementById('p-nom').value.trim(),
      categoria, subcategoria,
      unidad: document.getElementById('p-unidad').value,
      stockMinimo: document.getElementById('p-min').value,
      notas: document.getElementById('p-notas').value,
      unidadPack: usePack ? document.getElementById('p-upack').value : '',
      cantidadPack: usePack ? document.getElementById('p-cpack').value : '',
    };
    const res = await api('addProducto', payload);
    const sku = res.sku;

    // Stock inicial: si se cargó cantidad+zona, hacer el ingreso automáticamente.
    // Si el usuario eligió "Continuar sin agregar stock" arriba, saltamos el ingreso.
    const stockIni = parseFloat(document.getElementById('p-stock').value || '0');
    const zonaIni  = document.getElementById('p-stock-zona').value;
    let msg = `Producto creado ✓ SKU: <strong>${attrEsc(sku)}</strong>`;
    if (!skipStockInicial && stockIni > 0 && zonaIni) {
      await api('addMovimiento', {
        tipo: 'Ingreso', sku, cantidad: stockIni, zonaDestino: zonaIni,
        usuario: SESSION ? SESSION.user : '', notas: 'Stock inicial (alta de producto)',
      });
      msg += `<br>+ ingreso inicial de <strong>${stockIni}</strong> en <strong>${attrEsc(zonaIni)}</strong> ✓`;
    }
    document.getElementById('prod-msg').innerHTML = `<div class="alert alert-ok">${msg}</div>`;
    await init();
    setTimeout(() => closeModal(), 1200);
  } catch (err) {
    document.getElementById('prod-msg').innerHTML = `<div class="alert alert-err">${attrEsc(err.message)}</div>`;
  }
}

function previewFotoNueva(input) {
  if (!input.files || input.files.length === 0) return;
  const file = input.files[0];
  // Limpio el otro input para no tener 2 archivos a la vez
  const otroId = input.id === 'f-foto-galeria' ? 'f-foto-camara' : 'f-foto-galeria';
  const otro = document.getElementById(otroId);
  if (otro) otro.value = '';
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = document.getElementById('foto-preview-nueva');
    if (img) { img.src = e.target.result; img.style.opacity = '1'; }
  };
  reader.readAsDataURL(file);
  const btn = document.getElementById('btn-subir-foto');
  if (btn) btn.disabled = false;
}

async function submitFoto(sku) {
  try {
    const prod = STATE.productos.find(p => p.SKU === sku);
    const galeria = document.getElementById('f-foto-galeria');
    const camara = document.getElementById('f-foto-camara');
    let file = null;
    if (galeria && galeria.files && galeria.files.length > 0) file = galeria.files[0];
    else if (camara && camara.files && camara.files.length > 0) file = camara.files[0];
    if (!file) throw new Error('Elegí una foto desde la galería o sacá una con la cámara');
    document.getElementById('foto-msg').innerHTML = '<div class="alert alert-info">Subiendo... puede tardar unos segundos.</div>';
    const base64 = await fileToBase64(file);
    await apiPostJSON('uploadFoto', {
      sku, nombre: prod.Nombre, categoria: prod.Categoria || 'Varios',
      base64, mimeType: file.type || 'image/jpeg',
    });
    document.getElementById('foto-msg').innerHTML = `<div class="alert alert-ok">Foto guardada ✓</div>`;
    await init();
    setTimeout(() => closeModal(), 800);
  } catch (err) {
    document.getElementById('foto-msg').innerHTML = `<div class="alert alert-err">${attrEsc(err.message)}</div>`;
  }
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => {
      const s = reader.result;
      const idx = s.indexOf('base64,');
      res(idx >= 0 ? s.substring(idx + 7) : s);
    };
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

// ============== QR ==============
// Genero el PNG del QR acá en el navegador (api.qrserver.com), lo convierto
// a base64 y se lo mando al backend. Así el Apps Script no necesita el
// permiso de UrlFetchApp (scope external_request).
async function generarQRProducto(sku) {
  const prod = STATE.productos.find(p => p.SKU === sku);
  if (!prod) return;
  const container = document.getElementById('qr-container');
  container.innerHTML = '<div class="alert alert-info">Generando QR...</div>';
  try {
    // 1) Armo el destino del QR (la URL pública del Apps Script con el SKU).
    //    Como desde el HTML no conocemos la URL del /exec, mando un flag y
    //    el backend arma el qrData por su cuenta; mientras tanto uso un
    //    placeholder con el SKU para pintar un QR de previsualización.
    //    Para que el QR *apunte* al infoProducto real, piso los datos con
    //    una segunda llamada. Simpler: uso la API_URL (es la del /exec).
    const qrDestino = `${API_URL}?action=infoProducto&sku=${encodeURIComponent(sku)}`;
    const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(qrDestino)}&size=400x400&margin=20&format=png`;

    // 2) Bajo el PNG con fetch → blob → base64 (sin el prefijo data:...;base64,)
    const resp = await fetch(qrApiUrl);
    if (!resp.ok) throw new Error('No se pudo generar el QR (api.qrserver.com)');
    const blob = await resp.blob();
    const base64 = await blobToBase64(blob);

    // 3) Mando el base64 al backend para que lo guarde en Drive y en la
    //    columna QR_URL del producto.
    const res = await apiPostJSON('generarQR', {
      sku, nombre: prod.Nombre, categoria: prod.Categoria || 'Varios',
      base64,
    });
    container.innerHTML = `
      <div class="alert alert-ok">QR generado y guardado en Drive ✓</div>
      <img src="${attrEsc(res.url)}" class="qr-preview" alt="QR ${attrEsc(sku)}">
      <div class="hint" style="text-align:center;">Escaneá este QR desde cualquier celu para ver info + stock en tiempo real.</div>
      <div class="btn-row">
        <a class="btn btn-primary" href="${attrEsc(res.url)}" target="_blank" style="text-align:center;text-decoration:none;line-height:1;padding:14px 10px;">Ver en Drive</a>
        <a class="btn btn-secondary" href="${attrEsc(res.qrData)}" target="_blank" style="text-align:center;text-decoration:none;line-height:1;padding:14px 10px;">Probar link</a>
      </div>`;
    // Recargo productos para que el prod.QR_URL quede en STATE y se oculte el botón.
    await init();
  } catch (err) {
    container.innerHTML = `<div class="alert alert-err">${attrEsc(err.message)}</div>`;
  }
}

function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => {
      const s = reader.result;
      const idx = s.indexOf('base64,');
      res(idx >= 0 ? s.substring(idx + 7) : s);
    };
    reader.onerror = rej;
    reader.readAsDataURL(blob);
  });
}

// ============== ETIQUETA PNG (TERMICA B&N) ==============
// Generamos una etiqueta 800x1200 px (10cm x 15cm @ ~200 DPI, formato vertical)
// pura blanco-y-negro para impresoras termicas. Sin grises, sin emojis,
// sin gradientes, sin sombras. Todo tinta solida y bordes gruesos — lo unico
// que una termica imprime de forma fiable.
// Todo se arma en el cliente con canvas → PNG → descarga directa (no toca Drive).
async function generarEtiquetaProducto(sku) {
  const prod = STATE.productos.find(p => p.SKU === sku);
  if (!prod) return;
  const container = document.getElementById('qr-container');
  if (container) container.innerHTML = '<div class="alert alert-info">Generando etiqueta...</div>';
  try {
    // 1) QR en alta res via api.qrserver.com (CORS abierto → canvas exportable).
    const qrDestino = `${API_URL}?action=infoProducto&sku=${encodeURIComponent(sku)}`;
    const qrApiUrl  = `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(qrDestino)}&size=700x700&margin=1&format=png&ecc=H&color=000000&bgcolor=FFFFFF`;
    const qrImg = await _loadImageCors(qrApiUrl);

    // 2) Compongo la etiqueta. 10 cm x 15 cm @ ~200 DPI → 800 x 1200 px (portrait).
    const W = 800, H = 1200;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    // Anti-aliasing off para bordes nitidos en termica
    ctx.imageSmoothingEnabled = false;
    const FONT_SANS = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif';
    const FONT_MONO = '"SF Mono", Menlo, Consolas, "Liberation Mono", monospace';
    const BLACK = '#000000', WHITE = '#FFFFFF';

    // Fondo blanco
    ctx.fillStyle = WHITE;
    ctx.fillRect(0, 0, W, H);

    // Borde exterior negro grueso (6px) — marco claro de la etiqueta
    ctx.strokeStyle = BLACK;
    ctx.lineWidth = 6;
    ctx.strokeRect(3, 3, W - 6, H - 6);

    // --- Header: SIN relleno negro (la termica se funde con areas solidas grandes).
    // Todo en negro sobre blanco, separado con una linea gruesa abajo.
    const headerH = 130;

    // Icono de cajita dibujado a trazos (no emoji — los emoji en termica salen feos)
    // Cuadrado con "tapa" horizontal, tamaño aumentado para compensar que ahora
    // no hay fondo negro.
    const icoS = 54;
    const icoX = 90, icoY = (headerH - icoS) / 2 + 6;
    ctx.strokeStyle = BLACK;
    ctx.lineWidth = 5;
    ctx.lineJoin = 'miter';
    ctx.strokeRect(icoX, icoY, icoS, icoS);
    ctx.beginPath();
    ctx.moveTo(icoX, icoY + 16);
    ctx.lineTo(icoX + icoS, icoY + 16);
    ctx.stroke();

    // Texto del header en negro — "STOCK · EQTC"
    ctx.fillStyle = BLACK;
    ctx.font = `800 46px ${FONT_SANS}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('STOCK · EQTC', W/2 + 34, headerH/2 + 6);

    // --- Doble linea separadora debajo del header (refuerza visualmente
    // el corte entre el header y el cuerpo, ya sin relleno negro arriba) ---
    ctx.strokeStyle = BLACK;
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(30, headerH + 14); ctx.lineTo(W - 30, headerH + 14);
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(30, headerH + 26); ctx.lineTo(W - 30, headerH + 26);
    ctx.stroke();

    // --- Nombre del producto (bold grande, 2 lineas max, uppercase para legibilidad termica) ---
    ctx.fillStyle = BLACK;
    ctx.font = `800 48px ${FONT_SANS}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const nombreUpper = (prod.Nombre || '').trim().toUpperCase();
    const nombreLines = _wrapText(ctx, nombreUpper, W - 80, 2);
    const nombreBlockTop = 195;
    const nombreBlockH = 110; // reserva 2 lineas
    const nombreStartY = nombreLines.length === 1
      ? nombreBlockTop + nombreBlockH/2
      : nombreBlockTop + 32;
    nombreLines.forEach((line, i) => ctx.fillText(line, W/2, nombreStartY + i * 58));

    // --- Caja de categoria / subcategoria (rectangulo con borde negro, sin fill gris) ---
    const catLabel = (prod.Subcategoria || prod.Categoria || '').trim().toUpperCase();
    if (catLabel) {
      ctx.font = `700 26px ${FONT_SANS}`;
      const padX = 24, boxH = 50;
      const textW = ctx.measureText(catLabel).width;
      const boxW = Math.min(textW + padX * 2, W - 120);
      const boxX = (W - boxW) / 2;
      const boxY = 338;
      ctx.lineWidth = 4;
      ctx.strokeRect(boxX, boxY, boxW, boxH);
      ctx.fillStyle = BLACK;
      ctx.fillText(catLabel, W/2, boxY + boxH/2 + 1);
    }

    // --- QR con marco negro grueso (sin card gris) ---
    // El QR es el protagonista: lo mas grande posible manteniendo margenes decentes.
    const qrFrameSize = 620;
    const qrFrameX = (W - qrFrameSize) / 2;
    const qrFrameY = 420;
    ctx.lineWidth = 5;
    ctx.strokeRect(qrFrameX, qrFrameY, qrFrameSize, qrFrameSize);
    // QR interno, con padding de 16px blanco para no pisar el marco
    const qrPad = 16;
    const qrSize = qrFrameSize - qrPad * 2;
    ctx.drawImage(qrImg, qrFrameX + qrPad, qrFrameY + qrPad, qrSize, qrSize);

    // --- Doble linea separadora antes del SKU ---
    const sepY = qrFrameY + qrFrameSize + 30;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(40, sepY); ctx.lineTo(W - 40, sepY);
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(40, sepY + 10); ctx.lineTo(W - 40, sepY + 10);
    ctx.stroke();

    // --- SKU en monospace bold, GIGANTE, negro puro ---
    ctx.fillStyle = BLACK;
    ctx.font = `800 54px ${FONT_MONO}`;
    ctx.fillText(prod.SKU || '', W/2, sepY + 58);

    // --- Footer: texto instruccional, todo negro (no gris) ---
    ctx.font = `600 22px ${FONT_SANS}`;
    ctx.fillText('ESCANEA PARA VER STOCK EN TIEMPO REAL', W/2, sepY + 108);

    // 3) Descargo el PNG
    const pngBlob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    const pngUrl = URL.createObjectURL(pngBlob);
    const a = document.createElement('a');
    a.href = pngUrl;
    a.download = `etiqueta_${prod.SKU}_${_slugify(prod.Nombre)}.png`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(pngUrl), 3000);

    // 4) Preview en el container del modal
    if (container) container.innerHTML = `
      <div class="alert alert-ok">Etiqueta generada y descargada ✓</div>
      <img src="${pngUrl}" alt="Etiqueta ${attrEsc(sku)}" style="max-width:260px;display:block;margin:10px auto;border:1px solid #ddd;">
      <div class="hint" style="text-align:center;">PNG 800×1200 px blanco y negro puro — formato 10×15 cm (vertical), optimizado para impresora térmica. También imprime OK en láser/inkjet sobre etiqueta adhesiva 10×15.</div>`;
  } catch (err) {
    if (container) container.innerHTML = `<div class="alert alert-err">${attrEsc(err.message)}</div>`;
  }
}

// ---- Helpers para la etiqueta ----
function _loadImageCors(url) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => res(img);
    img.onerror = () => rej(new Error('No se pudo cargar el QR desde api.qrserver.com'));
    img.src = url;
  });
}

function _wrapText(ctx, text, maxWidth, maxLines) {
  const words = (text || '').split(/\s+/).filter(Boolean);
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur ? cur + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && cur) {
      lines.push(cur);
      cur = w;
    } else {
      cur = test;
    }
  }
  if (cur) lines.push(cur);
  if (maxLines && lines.length > maxLines) {
    lines.length = maxLines;
    while (ctx.measureText(lines[maxLines-1] + '…').width > maxWidth && lines[maxLines-1].length > 0) {
      lines[maxLines-1] = lines[maxLines-1].slice(0, -1);
    }
    lines[maxLines-1] += '…';
  }
  return lines;
}

function _roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function _slugify(s) {
  return (s || '').toString()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .replace(/[^\w\s-]/g, '').trim()
    .replace(/\s+/g, '-')
    .substring(0, 40);
}

function showZonaDetalle(codigo) {
  const z = STATE.zonas.find(x => x.Codigo === codigo);
  if (!z) return;
  const rows = (STATE.stock || [])
    .filter(r => r.SKU && Number(r[codigo] || 0) > 0)
    .sort((a,b) => Number(b[codigo]||0) - Number(a[codigo]||0));
  const totalProd = rows.length;
  const bajos = rows.filter(r => r.Alerta === 'BAJO STOCK').length;
  const lista = rows.length
    ? rows.map(r => `
        <div class="list-item" onclick='closeModal();setTimeout(()=>showDetalle(${jsStr(r.SKU)}),60)' style="cursor:pointer;">
          <div class="info">
            <strong>${attrEsc(r.Nombre || r.SKU)}</strong>

        </div>`).join('')
    : '<div class="empty">Sin stock en este depósito.</div>';
  openModal(`
    <h2>${attrEsc(z.Nombre)}</h2>
    <div class="sub" style="color:var(--muted);margin-bottom:8px;">${attrEsc(z.Codigo)}${z.Descripcion ? ' · ' + attrEsc(z.Descripcion) : ''}</div>

async function showConsumoObra(codigo) {
  const obra = STATE.obras.find(o => o.Codigo === codigo);
  openModal(`
    <h2>${attrEsc(obra ? obra.Nombre : codigo)}</h2>
    <div class="sub" style="color:var(--muted);margin-bottom:10px;">${attrEsc(codigo)}${obra && obra.Direccion ? ' · ' + attrEsc(obra.Direccion) : ''}</div>
    <div id="obra-content"><div class="loader"><div class="loader-spinner"></div><br>Cargando movimientos...</div></div>
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
    </div>
  `);
  try {
    const data = await api('getMovimientosObra', { obra: codigo });
    let html = '';
    if (data.reservas && data.reservas.length) {
      html += `<h3 style="color:var(--purple);font-size:15px;margin:10px 0 6px;">📌 Reservas vigentes</h3>`;
      html += data.reservas.map(r => `
        <div class="list-item">
          <div class="info"><strong>${attrEsc(r.nombre || r.sku)}</strong><small>${attrEsc(r.sku)}</small></div>
          <div style="font-weight:600;color:var(--purple)">${r.cantidad} ${attrEsc(r.unidad || '')}</div>
        </div>`).join('');
    }
    if (data.consumo && data.consumo.length) {
      html += `<h3 style="color:var(--orange);font-size:15px;margin:14px 0 6px;">📦 Consumo (egresos acumulados)</h3>`;
      html += data.consumo.map(c => `
        <div class="list-item">
          <div class="info"><strong>${attrEsc(c.nombre || c.sku)}</strong><small>${attrEsc(c.sku)}</small></div>
          <div style="font-weight:600;color:var(--orange)">${c.cantidad} ${attrEsc(c.unidad || '')}</div>
        </div>`).join('');
    }
    if (data.movimientos && data.movimientos.length) {
      html += `<h3 style="color:var(--primary);font-size:15px;margin:14px 0 6px;">📋 Histórico (${data.movimientos.length})</h3>`;
      html += `<div style="max-height:400px;overflow-y:auto;">`;
      html += data.movimientos.map(m => {
        const fecha = m.Fecha ? new Date(m.Fecha).toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'2-digit'}) : '';
        const prod = STATE.productos.find(p => p.SKU === m.SKU);
        return `
          <div class="mov-row">
            <span class="tipo ${attrEsc(m.Tipo)}">${attrEsc(m.Tipo)}</span>
            <div>
              <div><strong>${attrEsc(prod ? prod.Nombre : m.SKU)}</strong></div>
              <small style="color:var(--muted);">${fecha}${m.Usuario ? ' · ' + attrEsc(m.Usuario) : ''}${m.Notas ? ' · ' + attrEsc(m.Notas) : ''}</small>
            </div>
            <div style="text-align:right;font-weight:600;">${m.Cantidad}</div>
          </div>`;
      }).join('');
      html += `</div>`;
    }
    if (!html) html = '<div class="empty">Sin movimientos para esta obra todavía.</div>';
    document.getElementById('obra-content').innerHTML = html;
  } catch (err) {
    document.getElementById('obra-content').innerHTML = `<div class="alert alert-err">${attrEsc(err.message)}</div>`;
  }
}

// ============== MAPAS (Google Maps) ==============

let _mapInstance = null;
let _mapMarkers = [];
let _mapInfoWindow = null;

function _destroyMap() {
  if (_mapInfoWindow) { _mapInfoWindow.close(); _mapInfoWindow = null; }
  _mapMarkers.forEach(m => m.setMap(null));
  _mapMarkers = [];
  _mapInstance = null;
}

function _renderMapModal(titulo, items, color) {
  const parsed = items.map(it => ({ ...it, ll: it.coords || null }));
  const ok  = parsed.filter(p => p.ll);
  const bad = parsed.filter(p => !p.ll);

  openModal(`
    <h2>${attrEsc(titulo)}</h2>
    <div style="color:var(--muted);font-size:13px;margin-bottom:8px;">
      ${ok.length} en el mapa${bad.length ? ` · ${bad.length} sin ubicación válida` : ''}
    </div>
    <div id="mapa" style="height:60vh;min-height:360px;border-radius:10px;overflow:hidden;border:1px solid var(--border);"></div>
    ${bad.length ? `
      <details style="margin-top:10px;">
        <summary style="cursor:pointer;color:var(--muted);font-size:13px;">Sin ubicación (${bad.length})</summary>
        <div style="font-size:12px;color:var(--muted);margin-top:6px;">
          ${bad.map(b => `• ${attrEsc(b.nombre)} (sin coordenadas)`).join('<br>')}
        </div>
        <div class="hint" style="margin-top:6px;">
          Tip: en Google Maps, tocá y mantené un punto → copiá las coordenadas (ej: 34°52'04.2"S 58°10'27.3"W) y pegalas en la columna Coordenadas del Sheet.
        </div>
      </details>
    ` : ''}
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn btn-secondary" onclick="closeModal(); _destroyMap();">Cerrar</button>
    </div>
  `);

  setTimeout(() => {
    _destroyMap();
    if (!_gmapsLoaded || typeof google === 'undefined' || !google.maps) {
      document.getElementById('mapa').innerHTML =
        '<div class="alert alert-err" style="margin:10px;">No se pudo cargar Google Maps. Revisá que tengas internet y la API key sea válida.</div>';
      return;
    }

    const mapEl = document.getElementById('mapa');
    const map = new google.maps.Map(mapEl, {
      zoom: 4,
      center: { lat: -38.4, lng: -63.6 },
      mapTypeControl: false,
      streetViewControl: false,
      fullscreenControl: true,
      zoomControl: true,
      gestureHandling: 'greedy',
      styles: [
        { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] }
      ]
    });
    _mapInstance = map;
    _mapInfoWindow = new google.maps.InfoWindow();

    if (!ok.length) return;

    const bounds = new google.maps.LatLngBounds();

    ok.forEach(p => {
      const position = { lat: p.ll.lat, lng: p.ll.lng };
      const initial = (p.nombre || '').charAt(0).toUpperCase();

      const marker = new google.maps.Marker({
        position,
        map,
        label: {
          text: initial,
          color: '#fff',
          fontWeight: '700',
          fontSize: '12px'
        },
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          fillColor: color,
          fillOpacity: 1,
          strokeColor: '#fff',
          strokeWeight: 2,
          scale: 16
        },
        title: p.nombre
      });

      const mapsUrl = p.ubicacionUrl || _mapsLink(p.ll);
      const infoHtml =
        `<div style="min-width:180px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
          <div style="font-weight:700;margin-bottom:4px;font-size:14px;">${attrEsc(p.nombre)}</div>
          ${p.subtitulo ? `<div style="font-size:12px;color:#555;margin-bottom:6px;">${attrEsc(p.subtitulo)}</div>` : ''}
          ${mapsUrl ? `<a href="${attrEsc(mapsUrl)}" target="_blank" style="font-size:12px;color:#1a73e8;">Abrir en Google Maps ↗</a>` : ''}
        </div>`;

      marker.addListener('click', () => {
        _mapInfoWindow.setContent(infoHtml);
        _mapInfoWindow.open(map, marker);
      });

      _mapMarkers.push(marker);
      bounds.extend(position);
    });

    map.fitBounds(bounds);

    // Si hay un solo punto, hacer zoom a nivel calle
    if (ok.length === 1) {
      google.maps.event.addListenerOnce(map, 'bounds_changed', () => {
        map.setZoom(16);
      });
    }
  }, 80);
}

function openMapaObras() {
  const items = (STATE.obras || [])
    .filter(o => o.Estado !== 'Finalizada')
    .map(o => ({
      nombre: o.Nombre || o.Codigo,

// Arma un link de Google Maps a partir de coordenadas
function _mapsLink(coords) {
  if (!coords) return '';
  return 'https://www.google.com/maps?q=' + coords.lat + ',' + coords.lng;
}
